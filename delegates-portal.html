<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📋 مركز المناديب — Perfect Lab</title>
<!-- Firebase SDK — نفس تحميل السيستم الكبير -->
<script>
(function() {
  function loadScript(url, fallback, cb) {
    var s = document.createElement('script');
    s.src = url; s.onload = cb;
    s.onerror = function() {
      var s2 = document.createElement('script');
      s2.src = fallback; s2.onload = cb;
      s2.onerror = function(){ console.error('Firebase SDK failed to load'); };
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  }
  loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js','https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.min.js',function(){
    loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js','https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-database-compat.min.js',function(){});
    loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js','https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-auth-compat.min.js',function(){});
  });
})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
/* ═══ THEME 1 — ذهبي (إنستجرام) وأسود لامع — الافتراضي ═══ */
:root, body[data-theme="goldblack"]{
  --bg:#000000;--bg2:#121212;--bg3:#1c1c1c;--bg4:#262626;
  --text:#ffffff;--text2:#f5cf6b;--text3:#9a9a9a;
  --gold:#ffb400;--gold2:#ffd60a;
  --teal:#00d2af;--green:#2ecc71;--red:#ff4459;
  --orange:#ff7a00;--blue:#3897f0;--purple:#c13584;
  --border:#332b12;--radius:14px;
  --grad:linear-gradient(135deg,var(--gold),var(--gold2));
  --ontext:#1a1200;
  --gloss:inset 0 1px 0 rgba(255,255,255,.08), 0 4px 18px rgba(0,0,0,.5);
}
/* ═══ THEME 2 — أخضر (واتساب) وأبيض ═══ */
body[data-theme="whitegreen"]{
  --bg:#f7f9fa;--bg2:#ffffff;--bg3:#e9f5ef;--bg4:#d9f2e3;
  --text:#111b21;--text2:#54656f;--text3:#8696a0;
  --gold:#25d366;--gold2:#128c7e;
  --teal:#128c7e;--green:#25d366;--red:#e53935;
  --orange:#f39c12;--blue:#34b7f1;--purple:#7c5cff;
  --border:#d1d7db;--radius:14px;
  --grad:linear-gradient(135deg,var(--gold),var(--gold2));
  --ontext:#ffffff;
}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;transition:background .3s}
.glass{background:color-mix(in srgb, var(--bg2) 85%, transparent);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
/* THEME SWITCHER */
.theme-btn{background:var(--bg3);border:1px solid var(--border);color:var(--gold2);border-radius:10px;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
#login-screen.hidden{display:none}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px 24px;width:100%;max-width:360px;text-align:center}
.login-card h1{font-size:24px;color:var(--gold2);margin-bottom:4px}
.login-card p{font-size:14px;color:var(--text3);margin-bottom:24px}
.login-card input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:16px;font-family:inherit;margin-bottom:12px;direction:rtl}
.login-card input:focus{outline:none;border-color:var(--gold)}
.btn-login{width:100%;background:var(--grad);color:var(--ontext);font-weight:900;font-size:17px;border:none;border-radius:10px;padding:13px;cursor:pointer;font-family:inherit}
.login-err{color:var(--red);font-size:14px;margin-top:8px;display:none}

/* HEADER */
.header{background:color-mix(in srgb, var(--bg2) 92%, transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:17px;font-weight:900;color:var(--gold2)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--grad);color:var(--ontext);font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:8px;padding:4px 10px;font-size:13px;cursor:pointer;font-family:inherit}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 8px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:11px 12px;font-size:14px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}
.tab.on{color:var(--gold2);border-bottom-color:var(--gold)}

/* SEARCH */
.search-wrap{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:90}
.search-box{position:relative;display:flex;align-items:center}
.search-box svg{position:absolute;right:12px;width:15px;height:15px;color:var(--text3);pointer-events:none}
.search-box input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 36px 10px 32px;color:var(--text);font-size:15px;font-family:inherit;direction:rtl;transition:border-color .2s}
.search-box input:focus{outline:none;border-color:var(--gold)}
.search-box input::placeholder{color:var(--text3)}
.date-filter-row{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.date-filter-lbl{font-size:12px;color:var(--text3);font-weight:700}
.date-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 8px;color:var(--text);font-size:13px;font-family:inherit}
.date-filter-clear{background:none;border:none;color:var(--red);font-size:12px;font-weight:700;cursor:pointer;padding:4px}
.search-clear{position:absolute;left:8px;width:20px;height:20px;border:none;background:var(--bg4);color:var(--text3);border-radius:50%;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.search-clear.show{display:flex}

/* CONTENT */
.content{padding:14px;max-width:600px;margin:0 auto}

/* CARDS */
.card{background:color-mix(in srgb, var(--bg2) 90%, transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--gloss, 0 4px 18px rgba(0,0,0,.18))}
.card-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.card-head h3{font-size:15px;font-weight:900}

/* CLIENT CARD */
.client-card{background:color-mix(in srgb, var(--bg2) 90%, transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--gloss, 0 4px 18px rgba(0,0,0,.18));transition:transform .15s}
.client-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
.client-name{font-size:16px;font-weight:900}
.client-meta{font-size:13px;color:var(--text3);margin-top:3px}
.client-stats{display:flex;gap:10px;margin-top:6px}
.stat-pill{font-size:12px;padding:2px 8px;border-radius:20px;font-weight:700}
.pill-blue{background:rgba(59,130,246,.15);color:var(--blue)}
.pill-orange{background:rgba(249,115,22,.15);color:var(--orange)}
.pill-green{background:rgba(34,197,94,.15);color:var(--green)}
.pill-red{background:rgba(239,68,68,.15);color:var(--red)}
.client-body{display:none;border-top:1px solid var(--border);padding:12px 14px}
.client-body.open{display:block}

/* CASE ROW */
.case-row{padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.case-row:last-child{border:none}
.case-row-head{display:flex;justify-content:space-between;align-items:center}
.case-src{font-size:12px;padding:2px 6px;border-radius:20px;font-weight:700}
.src-dafter{background:rgba(59,130,246,.15);color:var(--blue)}
.src-proof{background:rgba(249,115,22,.15);color:var(--orange)}
.src-archive{background:rgba(34,197,94,.15);color:var(--green)}

/* VISIT FORM */
.visit-form{background:var(--bg3);border-radius:10px;padding:12px;margin-top:10px}
.visit-form textarea{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:14px;font-family:inherit;resize:none;direction:rtl;margin-bottom:8px}
.visit-form select{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:14px;font-family:inherit;margin-bottom:8px}

/* ADD CLIENT FORM */
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;color:var(--text3);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:15px;font-family:inherit;direction:rtl}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold)}

/* COMMISSION */
.comm-card{background:color-mix(in srgb, var(--bg2) 90%, transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--gloss, 0 4px 18px rgba(0,0,0,.18))}
.comm-total{font-size:30px;font-weight:900;color:var(--gold2)}
.comm-sub{font-size:13px;color:var(--text3);margin-top:2px}
.comm-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
.comm-row:last-child{border:none}

/* VISIT HISTORY */
.visit-item{padding:10px 0;border-bottom:1px solid var(--border)}
.visit-item:last-child{border:none}
.visit-type{font-size:12px;padding:2px 7px;border-radius:20px;font-weight:700;display:inline-block;margin-bottom:4px}
.vt-call{background:rgba(59,130,246,.15);color:var(--blue)}
.vt-visit{background:rgba(168,85,247,.15);color:var(--purple)}
.vt-followup{background:rgba(249,115,22,.15);color:var(--orange)}
.vt-other{background:rgba(107,112,144,.15);color:var(--text3)}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:700}
.badge-pending{background:rgba(249,115,22,.15);color:var(--orange)}
.badge-approved{background:rgba(45,212,191,.15);color:var(--teal)}

/* BUTTONS */
.btn{padding:9px 16px;border-radius:10px;border:none;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:transform .12s,filter .12s}
.btn:active{transform:scale(.96)}
.btn-gold{background:var(--grad);color:var(--ontext);box-shadow:0 3px 12px color-mix(in srgb, var(--gold) 35%, transparent), inset 0 1px 0 rgba(255,255,255,.35)}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-teal{background:rgba(45,212,191,.15);color:var(--teal);border:1px solid var(--teal)}
.btn-green{background:rgba(34,197,94,.15);color:var(--green);border:1px solid var(--green)}
.btn-red{background:rgba(239,68,68,.15);color:var(--red);border:1px solid var(--red)}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-block{width:100%;padding:11px}

/* DELIVERY CARDS */
.deliv-card{background:color-mix(in srgb, var(--bg2) 90%, transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;padding:14px;box-shadow:var(--gloss, 0 4px 18px rgba(0,0,0,.18))}
.deliv-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.deliv-client{font-size:16px;font-weight:900;color:var(--text)}
.deliv-meta{font-size:13px;color:var(--text3);margin-top:2px}
.deliv-product{font-size:14px;color:var(--gold2);margin-top:3px}
.deliv-btns{display:flex;gap:8px;margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.deliv-btns .btn{flex:1}
.deliv-badge{font-size:12px;padding:3px 9px;border-radius:20px;font-weight:700}
.deliv-badge.delivered{background:rgba(34,197,94,.15);color:var(--green)}
.deliv-badge.returned{background:rgba(239,68,68,.15);color:var(--red)}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:38px;margin-bottom:10px}

/* SPINNER */
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);padding:10px 20px;border-radius:20px;font-size:15px;z-index:9999;opacity:0;transition:.3s;pointer-events:none;border:1px solid var(--border)}
#toast.show{opacity:1}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:999;padding:16px}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal-box h3{font-size:17px;font-weight:900;margin-bottom:16px;color:var(--gold2)}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns .btn{flex:1}

/* DEBT BADGE */
.debt-badge{font-size:13px;padding:3px 8px;border-radius:20px;font-weight:700}
.debt-ok{background:rgba(34,197,94,.1);color:var(--green)}
.debt-warn{background:rgba(239,68,68,.1);color:var(--red)}

/* MONTH PILLS */
.month-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;scrollbar-width:none}
.month-pills::-webkit-scrollbar{display:none}
.month-pill{flex:none;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700;background:var(--bg3);color:var(--text3);border:1px solid var(--border);cursor:pointer;white-space:nowrap}
.month-pill.on{background:var(--grad);color:var(--ontext);border-color:transparent}

/* COMMISSION EXEMPT TOGGLE */
.comm-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);margin-top:6px;cursor:pointer;user-select:none}
.comm-toggle input{accent-color:var(--gold)}

/* GEO BUTTON */
.geo-btn{width:100%;background:var(--bg3);border:1px dashed var(--border);border-radius:8px;padding:10px;color:var(--teal);font-size:14px;font-family:inherit;cursor:pointer;text-align:center;margin-bottom:12px}
.geo-ok{border-color:var(--green)!important;color:var(--green)!important}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>📋 مركز المناديب</h1>
    <p>Perfect Lab Pro — تسجيل دخول المندوب</p>
    <input type="text" id="lg-user" placeholder="اسم المستخدم">
    <input type="password" id="lg-pass" placeholder="كلمة المرور">
    <button class="btn-login" onclick="doLogin()">دخول</button>
    <div class="login-err" id="lg-err"></div>
  </div>
</div>

<!-- LOGIN SCREEN REMOVED PERMANENTLY -->

<!-- HEADER -->
<div class="header" id="main-header" style="display:none">
  <div class="header-title">📋 مركز المناديب</div>
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:14px;color:var(--text3)" id="hd-name"></span>
    <button class="theme-btn" onclick="cycleTheme()" title="تغيير الألوان">🎨</button>
    <div class="avatar" id="hd-avatar">م</div>
    <button class="logout-btn" onclick="doLogout()">خروج</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs" id="main-tabs" style="display:none">
  <div class="tab on"  onclick="switchTab('clients',this)">👥 عملاءي</div>
  <div class="tab"     onclick="switchTab('cases',this)">📋 الحالات</div>
  <div class="tab"     onclick="switchTab('deliveries',this)">🚚 تسليمات</div>
  <div class="tab"     onclick="switchTab('visits',this)">🔄 متابعة زيارة</div>
  <div class="tab"     onclick="switchTab('commission',this)">💰 عمولتي</div>
  <div class="tab"     onclick="switchTab('addclient',this)">➕ زيارة جديدة</div>
</div>

<!-- SEARCH -->
<div class="search-wrap" id="search-wrap" style="display:none">
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="search-input" placeholder="بحث بالاسم أو رقم الحالة..." oninput="onSearchInput(this.value)">
    <button class="search-clear" id="search-clear-btn" onclick="clearSearch()">✕</button>
  </div>
  <div class="date-filter-row">
    <label class="date-filter-lbl">من:</label>
    <input type="date" id="date-from" class="date-input" onchange="onDateFilterChange()">
    <label class="date-filter-lbl">إلى:</label>
    <input type="date" id="date-to" class="date-input" onchange="onDateFilterChange()">
    <button class="date-filter-clear" id="date-clear-btn" onclick="clearDateFilter()" style="display:none">✕ مسح التاريخ</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content" id="main-content" style="display:none">
  <div class="spinner" id="loading-spinner"></div>
  <div id="tab-content"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay hidden" id="confirm-modal">
  <div class="modal-box">
    <h3 id="cm-title"></h3>
    <p id="cm-msg" style="font-size:14px;color:var(--text2);margin-bottom:6px"></p>
    <div id="cm-extra" class="hidden" style="margin-bottom:10px"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="cm-cancel">إلغاء</button>
      <button class="btn btn-gold" id="cm-ok">تأكيد</button>
    </div>
  </div>
</div>

<!-- VISIT MODAL -->
<!-- ADMIN PICK MODAL -->
<div class="modal-overlay hidden" id="admin-pick-modal">
  <div class="modal-box">
    <h3 style="font-size:15px;font-weight:900;margin-bottom:4px;color:var(--gold2)">📤 إرسال التقرير إلى</h3>
    <p style="font-size:12px;color:var(--text3);margin-bottom:10px">اختر رقم الإدارة المطلوب إرسال التقرير عليه</p>
    <div id="admin-pick-list"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeAdminPick()">إلغاء</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="visit-modal">
  <div class="modal-box">
    <h3>🗓️ تسجيل زيارة عميل محتمل</h3>
    <div class="form-group">
      <label>العميل المحتمل *</label>
      <select id="vm-prospect" onchange="onVisitProspectChange()">
        <option value="">-- اختر --</option>
      </select>
    </div>
    <div class="form-group">
      <label>الدكتور المُزار *</label>
      <select id="vm-doctor"><option value="">-- اختر الدكتور --</option></select>
    </div>
    <div class="form-group">
      <label>نتيجة الزيارة *</label>
      <select id="vm-result">
        <option value="">-- اختر --</option>
        <option value="interested">✅ مهتم</option>
        <option value="not_interested">❌ غير مهتم</option>
        <option value="follow">🔄 متابعة</option>
        <option value="contracted">🤝 تم التعاقد</option>
      </select>
    </div>
    <div class="form-group">
      <label>ملاحظات</label>
      <textarea id="vm-notes" rows="3" placeholder="ما الذي دار في الزيارة؟"></textarea>
    </div>
    <div class="form-group">
      <label>التاريخ</label>
      <input type="date" id="vm-date">
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeVisitModal()">إلغاء</button>
      <button class="btn btn-gold" onclick="saveVisit()">💾 حفظ الزيارة</button>
    </div>
  </div>
</div>

<!-- 🔌 Firebase مُعطّل — نسخة محلية بالكامل (بدون إنترنت) للمراجعة فقط -->
<script>
function initFirebase(){ /* no-op — offline build */ }
</script>

<script>
// ═══════════════════════════════════════
// CONFIG

// (رقم الإدارة بقى ديناميكي من data/shared/labinfo — شوف _getAdminNumbers أسفل)
let _fbRTDB=null,_fbInitDone=false,_fbAuthPending=false,_fbAuthFailCount=0,_fbLastAuthAttempt=0;
function _initFirebase(){
  if(typeof firebase==='undefined')return false;
  if(_fbInitDone)return true;
  if(_fbAuthPending)return false;
  if(typeof firebase.database!=='function')return false;
  if(typeof firebase.auth!=='function')return false;
  // نفس منطق الملف الرئيسي: backoff متزايد بدل محاولة كل 100ms وقت انقطاع الشبكة
  if(_fbAuthFailCount>0){
    const backoff=Math.min(2000*_fbAuthFailCount,10000);
    if(Date.now()-_fbLastAuthAttempt<backoff)return false;
  }
  try{
    if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
    _fbAuthPending=true;
    _fbLastAuthAttempt=Date.now();
    firebase.auth().signInAnonymously().then(function(){
      _fbRTDB=firebase.database();_fbInitDone=true;_fbAuthPending=false;_fbAuthFailCount=0;
      console.log('✅ Firebase: متصل بقاعدة بيانات PerfectLabPro');
    }).catch(function(e){
      _fbAuthPending=false;_fbAuthFailCount++;
      if(_fbAuthFailCount===1||_fbAuthFailCount%5===0)console.error('Firebase auth error:',e&&(e.code||e.message),'— محاولة رقم',_fbAuthFailCount);
      if(_fbAuthFailCount===3&&typeof toast==='function')toast('⚠️ تعذّر الاتصال بالسيرفر — تحقق من الإنترنت','err');
    });
    return false;
  }catch(e){console.warn('Firebase init error:',e);return false;}
}
function waitForFirebase(){
  return new Promise(resolve=>{
    if(_fbInitDone){resolve(true);return;}
    let tries=0;
    const iv=setInterval(()=>{
      if(_initFirebase()){clearInterval(iv);resolve(true);return;}
      tries++;
      if(tries>100){clearInterval(iv);resolve(false);} // بعد ~10s نرجع false ونسيب المحاولات في الخلفية مستمرة (backoff) لحد ما الاتصال يرجع
    },100);
  });
}
_initFirebase();
async function fbGet(path){
  await waitForFirebase();
  if(!_fbRTDB)return null;
  const snap=await _fbRTDB.ref(path).get();
  return snap.exists()?snap.val():null;
}
async function fbSet(path,val){
  await waitForFirebase();
  if(!_fbRTDB)throw new Error('لا يوجد اتصال بالإنترنت');
  return _fbRTDB.ref(path).set(val);
}
async function fbUpdate(path,val){
  await waitForFirebase();
  if(!_fbRTDB)throw new Error('لا يوجد اتصال بالإنترنت');
  return _fbRTDB.ref(path).update(val);
}
async function fbPush(path,val){
  await waitForFirebase();
  if(!_fbRTDB)throw new Error('لا يوجد اتصال بالإنترنت');
  const ref=_fbRTDB.ref(path).push();
  await ref.set({...val,id:ref.key});
  return ref.key;
}
function toArr(v){if(!v)return[];return Array.isArray(v)?v.filter(Boolean):Object.values(v).filter(Boolean);}
// مطابقة اسم المندوب — بتتجاهل فراغات زيادة واختلاف حالة الأحرف، عشان فروق كتابية بسيطة
// (مسافة زيادة، حرف كبير/صغير لو الاسم إنجليزي) متبقاش سبب لاختفاء عميل/حالة من البورتال
function _sameDelegateName(a,b){
  if(!a||!b)return false;
  return String(a).trim().toLowerCase()===String(b).trim().toLowerCase();
}
// مطابقة "هل العميل ده تابع للمندوب الحالي؟" — الأولوية دايمًا للـ delegateId (ثابت لا يتأثر
// بتغيير اسم المندوب لاحقًا من الأدمن)، وبعدين أسماء delegate/delegateName كـ fallback للسجلات
// القديمة اللي اتربطت قبل ما ميزة delegateId تتضاف، أو لو الربط اتعمل من مكان تاني.
function _belongsToDelegate(c){
  if(c.delegateId&&_user.id)return c.delegateId===_user.id;
  return _sameDelegateName(c.delegate,_user.name)||_sameDelegateName(c.delegateName,_user.name);
}
async function hashPassword(pass){
  const enc=new TextEncoder();
  const buf=await crypto.subtle.digest('SHA-256',enc.encode(pass));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function verifyPassword(pass,stored){
  if(!stored)return false;
  if(stored.length!==64)return pass===stored;
  return (await hashPassword(pass))===stored;
}

async function doLogin(){
  const uname=document.getElementById('lg-user').value.trim();
  const pass=document.getElementById('lg-pass').value.trim();
  if(!uname||!pass){toast('أدخل البيانات','err');return;}
  try{
    await waitForFirebase();
    if(!_fbRTDB){
      const saved=localStorage.getItem('dp_user');
      if(saved){_user=JSON.parse(saved);showApp();return;}
      showErr('لا يوجد اتصال بالإنترنت');return;
    }
    const users=toArr(await fbGet('data/shared/users'));
    const u=users.find(x=>x.role==='delegate'&&(x.name===uname||x.email===uname)&&x.active!==false);
    if(!u||!(await verifyPassword(pass,u.passHash||u.pass||''))){showErr();return;}
    const delegates=toArr(await fbGet('data/shared/delegates'));
    const del=delegates.find(d=>d.name===u.name)||{};
    _user={name:u.name,id:del.id||u.uid||u.name,commRate:del.comm||0,salary:del.salary||0};
    localStorage.setItem('dp_user',JSON.stringify(_user));
    showApp();
  }catch(e){
    console.error(e);
    const saved=localStorage.getItem('dp_user');
    if(saved){_user=JSON.parse(saved);showApp();}
    else showErr('خطأ في الاتصال');
  }
}
function showErr(m='اسم المستخدم أو كلمة المرور غلط'){
  const el=document.getElementById('lg-err');el.textContent=m;el.style.display='block';
}
function doLogout(){
  if(!confirm('تسجيل الخروج؟'))return;
  _user=null;localStorage.removeItem('dp_user');location.reload();
}

async function loadTab(tab){
  const content=document.getElementById('tab-content');
  const spinner=document.getElementById('loading-spinner');
  content.innerHTML='';spinner.style.display='block';
  try{
    // تحميل البيانات المشتركة من data/shared الحقيقي
    const [clients,dafter,proof,archive,prospects,prospectVisits,delegates,treasury,settlements]=await Promise.all([
      fbGet('data/shared/clients'),
      fbGet('data/shared/dafter'),
      fbGet('data/shared/proof'),
      fbGet('data/shared/archive'),
      fbGet('data/shared/prospects'),
      fbGet('data/shared/prospect_visits'),
      fbGet('data/shared/delegates'),
      fbGet('data/shared/treasury'),
      fbGet('data/shared/settlements')
    ]);
    _myClients=toArr(clients).filter(c=>_belongsToDelegate(c));
    _dafter=toArr(dafter).filter(r=>_sameDelegateName(r.delegate,_user.name));
    _proof=toArr(proof).filter(r=>_sameDelegateName(r.delegate,_user.name));
    _archive=toArr(archive).filter(r=>_sameDelegateName(r.delegate,_user.name));
    _myProspects=toArr(prospects).filter(p=>_belongsToDelegate(p)).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    _myVisits=toArr(prospectVisits).filter(v=>_sameDelegateName(v.delegate,_user.name)).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    // كارت حساب العميل: نحمّل فقط حركات الخزنة والتسويات الخاصة بعملاء هذا المندوب (خصوصية)
    {
      const myClientIds=new Set(_myClients.map(cl=>cl.id));
      const myClientNames=new Set(_myClients.map(cl=>cl.name));
      const belongsToMe=x=>(x.clientId&&myClientIds.has(x.clientId))||(!x.clientId&&myClientNames.has(x.accName));
      _treasury=toArr(treasury).filter(belongsToMe);
      _mySettlements=toArr(settlements).filter(belongsToMe);
    }
    // نسب العمولة المخصصة لكل عميل — متسجّلة جوه سجل المندوب نفسه (data/shared/delegates → clients[])
    // زي صفحة "ربط العملاء بالمناديب" بالسيستم الكبير بالظبط
    const myDel=toArr(delegates).find(d=>d.name===_user.name||d.id===_user.id);
    _myDelegateClientMap={};
    (myDel&&myDel.clients||[]).forEach(cc=>{if(cc&&cc.clientId)_myDelegateClientMap[cc.clientId]=cc;});
    spinner.style.display='none';
    if(tab==='clients')renderClients();
    else if(tab==='cases')renderCases();
    else if(tab==='deliveries')renderDeliveries();
    else if(tab==='visits')renderVisits();
    else if(tab==='commission')renderCommission();
    else if(tab==='addclient')renderAddClient();
  }catch(e){
    console.error(e);
    spinner.style.display='none';
    content.innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><p>خطأ في تحميل البيانات</p></div>`;
  }
}

function _clientCommRate(cl){
  // العمولة المخصصة لكل عميل متسجّلة جوه سجل المندوب نفسه data/shared/delegates → clients[]
  // بنفس شكل صفحة "ربط العملاء بالمناديب" بالظبط: {clientId, commEnabled, commRate}
  if(!cl)return {rate:_user.commRate||0,registered:false};
  const link=_myDelegateClientMap[cl.id];
  if(link){
    if(link.commEnabled===false)return {rate:0,registered:true}; // العمولة متقفلة لهذا العميل تحديدًا
    return {rate:+link.commRate||0,registered:true};
  }
  return {rate:_user.commRate||0,registered:false};
}

  return d.toISOString().slice(0,7);
}

function _matchClRec(r,cl){ return cl.id?r.clientId===cl.id:(!r.clientId&&r.client===cl.name); }
function _matchClTrs(t,cl){ return cl.id?t.clientId===cl.id:(!t.clientId&&t.accName===cl.name); }
function _clOpeningBal(cl){
  if(!cl||!cl.openingBalance||!cl.openingBalance.type||!cl.openingBalance.amount)return 0;
  const amt=+cl.openingBalance.amount||0;
  return cl.openingBalance.type==='debit'?amt:-amt;

function _clientAccountSummaryD(cl,from,to){
  const linkedSettledIds=new Set(_mySettlements.filter(s=>s.invoiceId).map(s=>s.invoiceId));
  const legacySettles=_mySettlements.filter(s=>!s.invoiceId);
  const openingBal=_clOpeningBal(cl);
  const dOf=r=>r.archivedAt?new Date(r.archivedAt).toISOString().split('T')[0]:(r.date||'');
  const prevArc=from?_archive.filter(r=>_matchClRec(r,cl)&&dOf(r)<from&&!linkedSettledIds.has(r.id)):[];
  const prevArcTotal=prevArc.reduce((s,r)=>s+(+r.total||0),0);
  const prevTrsPaid=(from?_treasury.filter(t=>_matchClTrs(t,cl)&&t.date<from&&!t.isTransfer&&t.type==='in'):[]).reduce((s,t)=>s+ +t.amount,0);
  const prevSettled=(from?legacySettles.filter(s=>_matchClTrs(s,cl)&&s.date<from):[]).reduce((s,x)=>s+ +x.amount,0);
  const prevDebt=prevArcTotal-prevTrsPaid-prevSettled;
  const periodArc=_archive.filter(r=>_matchClRec(r,cl)&&(!from||dOf(r)>=from)&&(!to||dOf(r)<=to)&&!linkedSettledIds.has(r.id));
  const periodTrs=_treasury.filter(t=>_matchClTrs(t,cl)&&(!from||t.date>=from)&&(!to||t.date<=to)&&!t.isTransfer);
  const periodSettles=legacySettles.filter(s=>_matchClTrs(s,cl)&&(!from||s.date>=from)&&(!to||s.date<=to));
  const withdrawn=periodArc.reduce((s,r)=>s+ +r.total,0);
  const realPaid=periodTrs.filter(t=>t.type==='in').reduce((s,t)=>s+ +t.amount,0);
  const settledAmt=periodSettles.reduce((s,x)=>s+ +x.amount,0);
  const paid=realPaid+settledAmt;
  const totalDebt=(openingBal+prevDebt)+withdrawn-paid;
  return {prevDebt,openingBal,withdrawn,paid,realPaid,settledAmt,totalDebt,periodArc,periodTrs};
}
// فترة كارت الحساب المالي — مبنية على الشهر المختار من فلتر "عملائي" (📅 الكل / شهر معيّن)
function _accPeriodFromMonth(curMonthKey){
  curMonthKey=curMonthKey||new Date().toISOString().slice(0,7);
  const activeMonth=_clientMonth==='current'?curMonthKey:_clientMonth;
  let accFrom='',accTo='';
  if(activeMonth!=='all'){
    const [ay,am]=activeMonth.split('-').map(Number);
    accFrom=activeMonth+'-01';
    accTo=new Date(ay,am,0).toISOString().slice(0,10);
  }
  return {activeMonth,accFrom,accTo};
}

async function sendClientAccountWA(clientId){
  const cl=_myClients.find(x=>x.id===clientId);
  if(!cl){toast('العميل غير موجود','err');return;}
  const phone=cl.wa||cl.phone;
  if(!phone){toast('لا يوجد رقم هاتف مسجّل لهذا العميل','err');return;}
  const {from:accFrom,to:accTo}=_effectiveClientRange(clientId);
  const acc=_clientAccountSummaryD(cl,accFrom,accTo);
  const li=(await fbGet('data/shared/labinfo'))||{};
  const labParts=[li.name||'Perfect Lab Pro'];
  if(li.ph1)labParts.push('📞 '+li.ph1);
  if(li.wa)labParts.push('💬 '+li.wa);
  const labLine=labParts.join(' | ');
  const sep='———————————';
  const debtLine=acc.totalDebt>0?'🔴 المتبقي: '+fmt(acc.totalDebt):'✅ رصيد دائن للعميل: '+fmt(Math.abs(acc.totalDebt));
  const msg=[labLine,sep,'📋 كارت حساب العميل: '+cl.name,
    '📅 الفترة: '+(accFrom||'البداية')+' ← '+(accTo||new Date().toISOString().slice(0,10)),'',
    '📊 ملخص الحساب:','💰 إجمالي الفواتير: '+fmt(acc.withdrawn),
    '✅ إجمالي المدفوع: '+fmt(acc.paid),debtLine,
    sep,labLine].join('\n');
  window.open(_waLink(phone,msg),'_blank');
}

    <div style="font-size:12px;color:var(--text3);margin-bottom:10px">الحالات المنتهية والمؤرشفة موجودة في تبويب "عملائي"</div>`+
  filtered.map(r=>`<div class="card" style="padding:12px 14px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:15px;font-weight:900">${esc(r.client)}</div>
        ${r.noteName?`<div style="font-size:13px;color:var(--teal)">👤 ${esc(r.noteName)}</div>`:''}
        <div style="font-size:13px;color:var(--text3)">#${esc(String(r.caseId||'-'))} · ${esc(r.product||'-')}</div>
        <div style="font-size:12px;color:var(--text3)">${esc(r.date||'-')} ${r.qty>1?`· ${r.qty} وحدة`:''}</div>
      </div>
      <span class="case-src ${r.src==='دفتر'?'src-dafter':'src-proof'}">${esc(r.src)}</span>
    </div>
  </div>`).join('');
}

// ═══════════════════════════════════════
// تقرير واتساب يومي للإدارة (شغل اليوم + حساب اليوم)
// ═══════════════════════════════════════
function buildDailyReportMsg(){
  // "اليوم" هنا = يوم شغل المندوب (من ٣ العصر لـ٣ الفجر)، مش نص الليل لنص الليل
  const shiftDate=shiftToday();
  const todayArchive=_archive.filter(r=>r.archivedAt&&shiftToday(r.archivedAt)===shiftDate);
  const delivered=todayArchive.filter(r=>r.handoverStatus==='delivered');
  const returned=todayArchive.filter(r=>r.handoverStatus==='returned');
  const visitsToday=_myVisits.filter(v=>v.date===shiftDate);

  let msg=`📋 *تقرير يومي — ${_user.name}*\n`;
  msg+=`📅 ${shiftDate}\n\n`;

  const totalCollected=delivered.reduce((s,r)=>s+ +(r.delegateReportedAmount||0),0);
  const totalNewCases=delivered.reduce((s,r)=>s+ +(r.reportedNewCasesCount||0),0);
  msg+=`🧾 *سند تسليم اليوم — ${delivered.length} حالة*\n\n`;
  delivered.forEach(r=>{
    msg+=`👤 ${r.client||'-'}${r.noteName?' — '+r.noteName:''}\n`;
    msg+=`✅ تم التسليم — ${r.product||'-'} (${r.deliveryType||'-'})\n`;
    if(+(r.delegateReportedAmount||0)>0)msg+=`💰 تم تحصيل ${r.delegateReportedAmount}ج (محتاج اعتماد الخزنة)\n`;
    if(+(r.reportedNewCasesCount||0)>0)msg+=`📥 تم استلام ${r.reportedNewCasesCount} حالة جديدة\n`;
    msg+=`\n`;
  });
  if(totalCollected>0||totalNewCases>0){
    msg+=`— الإجمالي —\n`;
    if(totalCollected>0)msg+=`💰 إجمالي التحصيل: ${totalCollected}ج\n`;
    if(totalNewCases>0)msg+=`📥 إجمالي الحالات الجديدة: ${totalNewCases}\n`;
    msg+=`\n`;
  }
  if(returned.length){
    msg+=`↩️ *مرتجعات اليوم:* ${returned.length}\n`;
    returned.forEach(r=>{
      msg+=`  • ${r.client||'-'}${r.noteName?' — 👤 اسم المريض: '+r.noteName:''}\n`;
    });
    msg+=`\n`;
  }

  const fmtVisitLine=v=>{
    const p=_myProspects.find(pp=>pp.id===v.prospectId);
    let s=`  • ${p?p.doctor:(v.doctor||'طبيب #'+v.prospectId)}\n`;
    if(p&&p.phone)s+=`    ☎️ ${p.phone}\n`;
    if(p&&(p.address||p.city||p.gov))s+=`    📍 ${[p.address,p.city,p.gov].filter(Boolean).join('، ')}\n`;
    s+=`    النتيجة: ${RESULT_LABELS[v.result]||v.result||'-'}\n`;
    if(v.notes)s+=`    ملاحظة: ${v.notes}\n`;
    if(p&&p.geo)s+=`    🗺️ https://maps.google.com/?q=${p.geo.lat},${p.geo.lng}\n`;
    return s;
  };
  const newVisits=visitsToday.filter(v=>v.result==='new');
  const followVisits=visitsToday.filter(v=>v.result!=='new');

  if(newVisits.length){
    msg+=`\n🆕✨ *عملاء جدد تمت زيارتهم اليوم:* ${newVisits.length}\n`;
    newVisits.forEach(v=>msg+=fmtVisitLine(v));
  }
  if(followVisits.length){
    msg+=`\n🔄 *متابعة زيارة اليوم:* ${followVisits.length}\n`;
    followVisits.forEach(v=>msg+=fmtVisitLine(v));
  }

  if(!delivered.length&&!returned.length&&!visitsToday.length)msg+=`\n— لا يوجد نشاط مسجّل اليوم —`;
  return msg;
}

// ═══════════════════════════════════════
// إرسال للإدارة — نفس منطق الكبير بالظبط: الأرقام من data/shared/labinfo
// (admin1/admin2/adminExtra) — رقم واحد يبعت مباشرة، أكتر من رقم يعرض قائمة اختيار
// ═══════════════════════════════════════
async function _getAdminNumbers(){
  const li=(await fbGet('data/shared/labinfo'))||{};
  const list=[];
  if(li.admin1)list.push({label:'رقم الإدارة 1',phone:li.admin1,group:li.admin1Group||li.group1||''});
  if(li.admin2)list.push({label:'رقم الإدارة 2',phone:li.admin2,group:li.admin2Group||li.group2||''});
  (li.adminExtra||[]).forEach(a=>{if(a.phone)list.push({label:a.label||'رقم إدارة إضافي',phone:a.phone,group:a.group||''});});
  // جروبات واتساب (روابط دعوة) — نفس li.waGroups المستخدمة في الملف الرئيسي
  (li.waGroups||[]).forEach(g=>{if(g.link)list.push({label:'📢 '+(g.name||'جروب واتساب'),phone:null,isGroup:true,link:g.link});});
  return list;
}
function _waLink(phone,msg){
  const clean=String(phone||'').replace(/[^0-9]/g,'');
  return `https://wa.me/${clean}?text=${encodeURIComponent(msg)}`;
}
// نسخ النص وفتح رابط جروب الواتساب — واتساب لا يسمح بحقن نص جاهز داخل جروب عبر رابط الدعوة
function _waGroupSend(msg,link){
  const openLink=()=>{if(link)window.open(link,'_blank');};
  if(navigator.clipboard){
    navigator.clipboard.writeText(msg).then(()=>{toast('✅ تم نسخ النص — الصقه داخل الجروب بعد فتحه');openLink();}).catch(openLink);
  }else{openLink();}
}
let _pendingAdminMsg='';
async function sendToAdminWithPicker(msg){
  const numbers=await _getAdminNumbers();
  if(!numbers.length){toast('لا يوجد رقم إدارة أو جروب مسجّل في بيانات المعمل الأساسية','err');return;}
  if(numbers.length===1){
    if(numbers[0].isGroup)_waGroupSend(msg,numbers[0].link);
    else window.open(_waLink(numbers[0].phone,msg),'_blank');
    return;
  }
  _pendingAdminMsg=msg;
  const list=document.getElementById('admin-pick-list');
  list.innerHTML=numbers.map((n,i)=>`<button class="btn btn-gold" style="margin-bottom:8px;width:100%" onclick="_sendAdminMsgTo(${i})">${esc(n.label)}${n.group?' — 🏷️ '+esc(n.group):''}${n.phone?' — '+esc(n.phone):''}</button>`).join('');
  list.dataset.numbers=JSON.stringify(numbers);
  document.getElementById('admin-pick-modal').classList.remove('hidden');
}
function _sendAdminMsgTo(idx){
  const list=document.getElementById('admin-pick-list');
  const numbers=JSON.parse(list.dataset.numbers||'[]');
  const n=numbers[idx];
  document.getElementById('admin-pick-modal').classList.add('hidden');
  if(!n)return;
  if(n.isGroup)_waGroupSend(_pendingAdminMsg,n.link);
  else window.open(_waLink(n.phone,_pendingAdminMsg),'_blank');
}
function closeAdminPick(){document.getElementById('admin-pick-modal').classList.add('hidden');}

function sendDailyReportToAdmin(){
  const msg=buildDailyReportMsg();
  sendToAdminWithPicker(msg);
}

// DELIVERIES TAB — تسليم / ارتجاع (بروفه أو نهائي)
// ═══════════════════════════════════════
// المنتجات اللي بتاخد مرحلة "بروفه" الأول (زيركون/معدن/بورسلين/فيس)
// أي منتج تاني (متحرك/تقويم..) بيعتبر "نهائي" وبيروح للتسليم على طول من الدفتر
function needsProofStage(product){
  const n=(product||'').toLowerCase();
  return n.includes('زيركون')||n.includes('معدن')||n.includes('بورسلين')||n.includes('فيس');
}

function renderDeliveries(){
  const c=document.getElementById('tab-content');
  // بروفه: حالات محوّلة للبروفه وجاهزة للتسليم
  const proofItems=_proof.map(r=>({...r,delivType:'بروفة'}));
  // نهائي: حالات في الدفتر لمنتجات مالهاش مراحل فني (بتتسلم مباشرة بدون بروفه)
  const finalItems=_dafter.filter(r=>!needsProofStage(r.product)).map(r=>({...r,delivType:'نهائي'}));
  const source=[...proofItems,...finalItems].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const pending=source.filter(r=>matchesSearch([r.client,r.noteName,r.caseId,r.product])&&matchesDateRange(r.date));

  if(!source.length){
    c.innerHTML=`<button class="btn btn-teal btn-sm btn-block" style="margin-bottom:12px" onclick="sendDailyReportToAdmin()">📱 إرسال تقرير اليوم للإدارة (واتساب)</button>
      <div class="empty"><div class="empty-icon">🚚</div><p>مفيش حالات جاهزة للتسليم دلوقتي</p></div>`;return;
  }
  if(!pending.length){
    c.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><p>لا توجد نتائج مطابقة للبحث</p></div>`;return;
  }

  c.innerHTML=`<button class="btn btn-teal btn-sm btn-block" style="margin-bottom:12px" onclick="sendDailyReportToAdmin()">📱 إرسال تقرير اليوم للإدارة (واتساب)</button>
    <div style="font-size:14px;color:var(--text3);margin-bottom:10px">${pending.length} حالة جاهزة للتسليم (بروفه: ${proofItems.length} · نهائي: ${finalItems.length})</div>`+
  pending.map(r=>`
    <div class="deliv-card" id="deliv-${esc(r.id)}">
      <div class="deliv-head">
        <div>
          <div class="deliv-client">${esc(r.client)}</div>
          ${r.noteName?`<div style="font-size:13px;color:var(--teal)">👤 ${esc(r.noteName)}</div>`:''}
          <div class="deliv-meta">#${esc(String(r.caseId||'-'))} · ${esc(r.date||'-')}</div>
          <div class="deliv-product">🦷 ${esc(r.product||'-')} ${r.qty>1?`× ${r.qty}`:''}</div>
        </div>
        <span class="case-src ${r.delivType==='بروفة'?'src-proof':'src-dafter'}">${esc(r.delivType)}</span>
      </div>
      <div class="deliv-btns">
        <button class="btn btn-green" onclick="confirmDelivery('${esc(r.id)}','${esc(r.delivType)}')">✅ تأكيد التسليم</button>
        <button class="btn btn-red" onclick="confirmReturn('${esc(r.id)}','${esc(r.delivType)}')">↩️ تأكيد الارتجاع</button>
      </div>
    </div>`).join('');
}

function showModal(title,msg,onOk,extraHtml,onCancel){
  document.getElementById('cm-title').textContent=title;
  document.getElementById('cm-msg').textContent=msg;
  const extraBox=document.getElementById('cm-extra');
  if(extraHtml){extraBox.innerHTML=extraHtml;extraBox.classList.remove('hidden');}
  else{extraBox.innerHTML='';extraBox.classList.add('hidden');}
  const okBtn=document.getElementById('cm-ok');
  const newOk=okBtn.cloneNode(true); // إزالة أي مستمعين سابقين
  okBtn.parentNode.replaceChild(newOk,okBtn);
  newOk.addEventListener('click',()=>{onOk&&onOk();});
  const cancelBtn=document.getElementById('cm-cancel');
  const newCancel=cancelBtn.cloneNode(true);
  cancelBtn.parentNode.replaceChild(newCancel,cancelBtn);
  // onCancel اختياري: لو محدّدة بتستخدم للانتقال لخطوة تانية في سلسلة نوافذ بدل ما تقفل على طول
  newCancel.addEventListener('click',()=>{if(onCancel)onCancel();else closeModal();});
  document.getElementById('confirm-modal').classList.remove('hidden');
}
function closeModal(){document.getElementById('confirm-modal').classList.add('hidden');}

function findDelivItem(id,delivType){
  return delivType==='بروفة'?_proof.find(x=>x.id===id):_dafter.find(x=>x.id===id);
}

async function confirmDelivery(id,delivType){
  const r=findDelivItem(id,delivType);
  if(!r)return;
  showModal('تأكيد التسليم',`هل تم تسليم حالة "${r.client}" · #${r.caseId||'-'} (${delivType}) فعلاً للعميل؟`,async()=>{
    try{
      const archived=await moveToArchive(r,'delivered',delivType);
      loadTab('deliveries'); // الصفحة تفضل فاضية من الحالة دي بعد التأكيد
      askCollection(archived); // بعد التسليم مباشرة: نافذة تلقائية — هل فيه تحصيل؟
    }catch(e){toast('خطأ أثناء التأكيد','err');closeModal();}
  });
}

// خطوة ٢ (اتوماتيك بعد التسليم): هل حصّل المندوب مبلغ من العميل؟
function askCollection(archived){
  const extraHtml=`<div class="form-group" style="margin:0">
    <label>💰 اكتب المبلغ اللي حصّلته من العميل الآن (سيبها فاضية أو دوس إلغاء لو مفيش تحصيل)</label>
    <input type="number" id="collect-amount-input" inputmode="decimal" placeholder="0" style="width:100%;font-size:16px">
  </div>`;
  showModal('فيه تحصيل؟',`حالة "${archived.client}" — تم التسليم ✅`,async()=>{
    const input=document.getElementById('collect-amount-input');
    const amount=Math.max(0,+((input&&input.value)||0));
    if(amount>0){
      archived.delegateReportedAmount=amount; // بيتحدّث في _archive المحلي عشان يظهر في تقرير اليوم
      try{await logDelegateReportedCollection(archived,amount);}catch(e){}
    }
    askNewCases(archived);
  },extraHtml,()=>askNewCases(archived)); // إلغاء = مفيش تحصيل، وكمِّل للخطوة الجاية
}

// خطوة ٣ (اتوماتيك بعد التحصيل): هل استلم مقاسات/حالات جديدة (مش بروفة) من نفس العميل؟
function askNewCases(archived){
  const extraHtml=`<div class="form-group" style="margin:0">
    <label>📥 استلمت مقاسات جديدة من نفس العميل؟ اكتب العدد (سيبها فاضية أو دوس إلغاء لو مفيش)</label>
    <input type="number" id="newcases-count-input" inputmode="numeric" min="0" placeholder="0" style="width:100%;font-size:16px">
  </div>`;
  const finish=async()=>{
    const input=document.getElementById('newcases-count-input');
    const count=Math.max(0,Math.round(+((input&&input.value)||0)));
    if(count>0){
      archived.reportedNewCasesCount=count; // بيتحدّث في _archive المحلي عشان يظهر في تقرير اليوم
      try{await logDelegateNewCases(archived,count);}catch(e){}
    }
    closeModal();
  };
  showModal('استلمت مقاسات جديدة؟',`عميل "${archived.client}"`,finish,extraHtml,finish);
}

// تسجيل مبلغ بلَّغ عنه المندوب وقت تسليم حالة معيّنة — قائمة منفصلة تمامًا عن data/shared/treasury
// الهدف: توثيق سريع وسهل من المندوب، من غير ما نلمس حسابات الخزنة الفعلية أو نخاطر بتعارض
// الكتابة على نفس المسار اللي بيستخدمه السيستم الكبير. الإدارة تراجع وتعتمد/ترحّل يدويًا من
// صفحة الخزنة الأساسية. لو حبينا لاحقًا نربطها تلقائيًا بدفتر السيستم الكبير (تسهيل الإدخال)،
// المكان ده جاهز كمصدر بيانات — يحتاج شغل إضافي في الملف الرئيسي مش هنا.
async function logDelegateReportedCollection(r,amount){
  try{
    const path='data/shared/delegatePendingCollections';
    const all=toArr(await fbGet(path));
    const entry={
      id:'pc_'+r.id+'_'+Date.now(),
      sourceId:r.sourceId||r.id,
      caseId:r.caseId||'-',
      client:r.client||'-',
      clientId:r.clientId||r.delegateClientId||null,
      product:r.product||'-',
      amount,
      delegateId:_user.id||_user.delegateId||null,
      delegateName:_user.name||'-',
      date:r.date||shiftToday(),
      status:'pending', // pending → لسه محتاج اعتماد الإدارة وترحيله للخزنة يدويًا
      createdAt:Date.now()
    };
    await fbSet(path,[...all,entry]);
  }catch(e){/* فشل تسجيل المبلغ للمراجعة ما يمنعش إتمام التسليم نفسه */}
}

// تسجيل عدد مقاسات/حالات جديدة استلمها المندوب من العميل — قائمة منفصلة عن data/shared/dafter
// الهدف: تجهيز البيانات عشان موظف الدفتر في السيستم الكبير يلاقي إشعار جاهز (اسم العميل +
// عدد الحالات) بدل ما يستنى المندوب يقوله شفهيًا. الإدخال الفعلي في الدفتر لسه محتاج شغل
// إضافي في الملف الرئيسي (مش هنا) عشان يقرا المسار ده ويعرضه كنافذة عند فتح صفحة الدفتر.
async function logDelegateNewCases(r,count){
  try{
    const path='data/shared/delegatePendingNewCases';
    const all=toArr(await fbGet(path));
    const entry={
      id:'nc_'+r.sourceId+'_'+Date.now(),
      sourceId:r.sourceId||r.id,
      client:r.client||'-',
      clientId:r.clientId||r.delegateClientId||null,
      reportedCount:count,
      confirmedCount:null, // هيتملى من موظف الدفتر لما يتأكد العدد اللي فعلاً وصل المعمل
      delegateId:_user.id||_user.delegateId||null,
      delegateName:_user.name||'-',
      date:r.date||shiftToday(),
      status:'pending', // pending → لسه محتاج فتح ٨ سجلات دفتر جديدة باسم العميل
      createdAt:Date.now()
    };
    await fbSet(path,[...all,entry]);
  }catch(e){/* فشل التسجيل ما يمنعش إتمام التسليم نفسه */}
}

async function confirmReturn(id,delivType){
  const r=findDelivItem(id,delivType);
  if(!r)return;
  showModal('تأكيد الارتجاع',`هل تم ارتجاع حالة "${r.client}" · #${r.caseId||'-'} (${delivType}) من العميل؟`,async()=>{
    try{
      await moveToArchive(r,'returned',delivType);
      toast('↩️ تم تسجيل الارتجاع');
      loadTab('deliveries');
    }catch(e){toast('خطأ أثناء التأكيد','err');}
    closeModal();
  });
}

// نقل حالة (بروفه أو نهائي من الدفتر) إلى الأرشيف — بنفس شكل doArchive() الحقيقي بالظبط
// ⚠️ ملاحظة أمان: dafter/proof متخزّنين كمصفوفة كاملة في فايربيز (زي السيستم الكبير
// بالظبط)، فالعملية دي بتقرا المصفوفة كاملة وتكتبها تاني بعد الحذف — لو حصل تعديل
// من جهاز تاني في نفس اللحظة بالظبط ممكن يحصل تعارض. نفس المخاطرة الموجودة أصلاً
// في moveToProof()/doArchive() بالسيستم الكبير، فمفيش تغيير في مستوى الأمان الحالي.
//
// ⚠️ مهم جدًا: حقل "status" في الأرشيف الحقيقي بيعني حالة السداد (unpaid/paid) —
// مش حالة التسليم! فبنستخدم حقل مستقل "handoverStatus" عشان "تم التسليم/تم الارتجاع"
// من غير ما نلخبط حساب مديونية العميل في السيستم الكبير.
async function moveToArchive(r,handoverStatus,delivType){
  const srcPath=delivType==='بروفة'?'data/shared/proof':'data/shared/dafter';
  // 1) شيل الحالة من مصدرها المشترك (بروفه أو دفتر)
  const srcAll=toArr(await fbGet(srcPath));
  const newSrc=srcAll.filter(p=>p.id!==r.id);
  await fbSet(srcPath,newSrc);
  // 2) ضيفها للأرشيف — نفس شكل doArchive() في السيستم الكبير بالظبط
  const archiveAll=toArr(await fbGet('data/shared/archive'));
  const arcTs=Date.now();
  const archived={
    ...r,
    id:'a_'+r.id+'_'+arcTs,
    sourceId:r.id,
    handoverStatus, // 'delivered' | 'returned' — حقلنا الخاص، منفصل عن حساب السداد
    deliveryType:delivType,
    technicians:r.technicians||{},
    paid:0,
    remaining:r.total||0,
    status:'unpaid', // نفس قيمة doArchive() الافتراضية — بيتغيّر لاحقًا من صفحة الخزنة عند التحصيل
    archivedAt:arcTs,
    createdAt:r.createdAt||arcTs
  };
  await fbSet('data/shared/archive',[...archiveAll,archived]);
  // 3) تحديث الحالة المحلية فورًا
  if(delivType==='بروفة')_proof=_proof.filter(p=>p.id!==r.id);
  else _dafter=_dafter.filter(p=>p.id!==r.id);
  _archive=[..._archive,archived];
  return archived;
}


const RESULT_LABELS={interested:'✅ مهتم',not_interested:'❌ غير مهتم',follow:'🔄 متابعة',contracted:'🤝 تم التعاقد',new:'🆕 أول زيارة'};
function renderVisits(){
  const c=document.getElementById('tab-content');
  c.innerHTML=`<button class="btn btn-gold btn-sm" style="margin-bottom:12px" onclick="openVisitModal()">➕ تسجيل متابعة زيارة</button>`;
  if(!_myProspects.length){
    c.innerHTML+=`<div class="empty"><div class="empty-icon">🔄</div><p>لسه معندكش زيارات مسجّلة — ضيفي واحدة من تاب "زيارة جديدة"</p></div>`;return;
  }
  // قائمة الأطباء اللي عندك عشان تقدر تسجّل متابعة لأي حد فيهم بضغطة واحدة
  const pFiltered=_myProspects.filter(p=>matchesSearch([p.doctor,p.city,p.gov]));
  const filtered=_myVisits.filter(v=>{
    const p=_myProspects.find(pp=>pp.id===v.prospectId);
    return matchesSearch([p?.doctor,v.doctor,v.notes])&&matchesDateRange(v.date);
  });
  c.innerHTML+=`<div style="font-size:14px;color:var(--text3);margin-bottom:10px">${_myProspects.length} طبيب · ${_myVisits.length} متابعة مسجّلة</div>`;

  if(pFiltered.length){
    c.innerHTML+=`<div style="font-size:13px;font-weight:700;color:var(--gold2);margin-bottom:8px">👨‍⚕️ سجّل متابعة سريعة</div>`;
    c.innerHTML+=`<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;scrollbar-width:none">`+
      pFiltered.map(p=>`<button class="btn btn-ghost btn-sm" style="flex:none" onclick="openVisitModal(${esc(p.id)})">${esc(p.doctor)}</button>`).join('')+
    `</div>`;
  }

  if(!filtered.length){
    c.innerHTML+=`<div class="empty"><div class="empty-icon">🔍</div><p>لا توجد متابعات مسجّلة مطابقة</p></div>`;return;
  }
  c.innerHTML+=filtered.map(v=>{
    const p=_myProspects.find(pp=>pp.id===v.prospectId);
    return`<div class="card" style="padding:12px 14px;margin-bottom:10px">
      <div style="font-size:15px;font-weight:900">${esc(p?p.doctor:(v.doctor||'طبيب #'+v.prospectId))}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
        <span class="visit-type vt-${v.result==='contracted'?'visit':v.result==='interested'?'followup':v.result==='not_interested'?'call':'other'}">${RESULT_LABELS[v.result]||v.result}</span>
        <span style="font-size:12px;color:var(--text3)">${esc(v.date)}</span>
      </div>
      ${v.notes?`<div style="font-size:14px;margin-top:6px">${esc(v.notes)}</div>`:''}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// COMMISSION TAB
// ═══════════════════════════════════════
let _commMonth='current';
function renderCommission(){
  const c=document.getElementById('tab-content');
  const rate=_user.commRate||0;
  const curMonthKey=new Date().toISOString().slice(0,7);
  const monthKeys=[...new Set(_archive.map(_caseMonthKey).filter(Boolean))].sort().reverse();
  if(!monthKeys.includes(curMonthKey))monthKeys.unshift(curMonthKey);
  const activeMonth=_commMonth==='current'?curMonthKey:_commMonth;

  const pills=`<div class="month-pills">
    <div class="month-pill ${_commMonth==='all'?'on':''}" onclick="setCommMonth('all')">📅 كل الفترات</div>
    ${monthKeys.map(k=>`<div class="month-pill ${activeMonth===k&&_commMonth!=='all'?'on':''}" onclick="setCommMonth('${k}')">${k===curMonthKey?'الشهر الحالي':_monthLabel(k)}</div>`).join('')}
  </div>`;

  const scoped=_commMonth==='all'?_archive:_archive.filter(r=>_caseMonthKey(r)===activeMonth);

  // حساب العمولة بنسبة كل عميل (دكتور) المسجّلة في بياناته الأساسية — مش نسبة موحّدة لكل الحالات
  let totalComm=0;
  const byClient={};
  scoped.forEach(r=>{
    const total=+r.total||0;
    const cl=_myClients.find(c=>c.name===r.client);
    const cr=_clientCommRate(cl);
    const comm=total*(cr.rate/100);
    totalComm+=comm;
    const cn=r.client||'-';
    if(!byClient[cn])byClient[cn]={cases:0,total:0,comm:0,rate:cr.rate,registered:cr.registered};
    byClient[cn].cases++;byClient[cn].total+=total;byClient[cn].comm+=comm;
  });

  const totalDebt=scoped.reduce((s,r)=>s+(+r.remaining||0),0);
  const totalCollected=scoped.reduce((s,r)=>s+(+r.paid||0),0);

  // بطاقة اليوم — بنفس تعريف يوم الشغل (٣ العصر لـ٣ الفجر)
  const shiftDate=shiftToday();
  const todayDelivered=_archive.filter(r=>r.archivedAt&&shiftToday(r.archivedAt)===shiftDate&&r.handoverStatus==='delivered');
  const todaySales=todayDelivered.reduce((s,r)=>s+(+r.total||0),0);
  const todayComm=todayDelivered.reduce((s,r)=>{
    const cl=_myClients.find(c=>c.name===r.client);
    return s+(+r.total||0)*(_clientCommRate(cl).rate/100);
  },0);

  c.innerHTML=pills+`
    <div class="comm-card">
      <div style="font-size:14px;color:var(--text3);margin-bottom:6px">🕒 اليوم</div>
      <div class="comm-row"><span style="color:var(--text3)">مبيعات اليوم</span><span style="font-weight:700">${fmt(todaySales)} ج.م</span></div>
      <div class="comm-row"><span style="color:var(--text3)">عمولة اليوم</span><span style="font-weight:900;color:var(--gold2)">${fmt(todayComm)} ج.م</span></div>
    </div>
    <div class="comm-card">
      <div style="font-size:14px;color:var(--text3);margin-bottom:6px">💰 إجمالي العمولة المحسوبة${_commMonth!=='all'?' — '+(activeMonth===curMonthKey?'الشهر الحالي':_monthLabel(activeMonth)):' — كل الفترات'}</div>
      <div class="comm-total">${fmt(totalComm)} ج.م</div>
      <div class="comm-sub">من ${scoped.length} حالة مكتملة (حسب نسبة عمولة كل دكتور)</div>
    </div>
    ${_user.salary>0?`<div class="comm-card">
      <div style="font-size:14px;color:var(--text3);margin-bottom:6px">🏦 الراتب الثابت</div>
      <div class="comm-total" style="color:var(--teal)">${fmt(_user.salary)} ج.م / شهريًا</div>
      <div class="comm-sub">إجمالي مستحقاتك المتوقعة: ${fmt(_user.salary+totalComm)} ج.م (راتب + عمولة)</div>
    </div>`:''}
    <div class="comm-card">
      <div style="font-size:14px;color:var(--text3);margin-bottom:10px">📊 ملخص مالي</div>
      <div class="comm-row"><span style="color:var(--text3)">إجمالي مبيعات عملاءك</span><span style="font-weight:700">${fmt(scoped.reduce((s,r)=>s+(+r.total||0),0))} ج.م</span></div>
      <div class="comm-row"><span style="color:var(--text3)">تم تحصيله</span><span style="font-weight:700;color:var(--green)">${fmt(totalCollected)} ج.م</span></div>
      <div class="comm-row"><span style="color:var(--text3)">متبقي (ديون)</span><span style="font-weight:700;color:${totalDebt>0?'var(--red)':'var(--green)'}">${fmt(totalDebt)} ج.م</span></div>
      <div class="comm-row"><span style="color:var(--text3)">نسبتك العامة الافتراضية</span><span style="font-weight:700;color:var(--gold2)">${rate}%</span></div>
    </div>
    <div class="comm-card">
      <div style="font-size:14px;color:var(--text3);margin-bottom:10px">👥 تفصيل حسب العميل</div>
      ${Object.entries(byClient).map(([name,d])=>`
        <div class="comm-row">
          <div>
            <div style="font-size:14px;font-weight:700">${esc(name)}</div>
            <div style="font-size:12px;color:var(--text3)">${d.cases} حالة · ${fmt(d.total)} ج.م مبيعات · نسبة ${d.rate}%${d.registered?'':' (افتراضية)'}</div>
          </div>
          <div style="font-weight:900;color:var(--gold2)">${fmt(d.comm)} ج.م</div>
        </div>`).join('')}
    </div>`;
}
function setCommMonth(k){_commMonth=k;renderCommission();}

// ═══════════════════════════════════════
// ADD PROSPECT TAB — عميل محتمل جديد (نفس شكل data/shared/prospects الحقيقي)
// ═══════════════════════════════════════
let _ncGeo=null;
function renderAddClient(){
  const c=document.getElementById('tab-content');
  c.innerHTML=`
    <div class="card" style="padding:16px">
      <h3 style="font-size:16px;font-weight:900;color:var(--gold2);margin-bottom:16px">➕ زيارة جديدة</h3>
      <div class="form-group"><label>اسم الدكتور *</label><input type="text" id="nc-doctor" placeholder="اسم الدكتور"></div>
      <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="nc-phone" placeholder="01xxxxxxxxx"></div>
      <div class="form-group"><label>واتساب</label><input type="tel" id="nc-whatsapp" placeholder="01xxxxxxxxx"></div>
      <div class="form-group"><label>المحافظة</label>
        <select id="nc-gov" onchange="onNcGovChange()">
          <option value="">-- اختر المحافظة --</option>
          ${EGY_GOVS.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>المدينة / المنطقة</label>
        <select id="nc-city"><option value="">-- اختر المحافظة أولاً --</option></select>
      </div>
      <div class="form-group"><label>العنوان بالتفصيل</label><input type="text" id="nc-address" placeholder="اسم الشارع / علامة مميزة"></div>
      <div class="form-group">
        <label>الموقع الجغرافي</label>
        <button type="button" class="geo-btn" id="nc-geo-btn" onclick="captureNcGeo()">📍 تحديد موقعي الحالي</button>
      </div>
      <div class="form-group"><label>ملاحظات</label><textarea id="nc-notes" rows="3" placeholder="أي ملاحظات إضافية..."></textarea></div>
      <button class="btn btn-gold btn-block" onclick="submitNewProspect()">💾 حفظ الزيارة</button>
    </div>
    ${_myProspects.length?`
    <div style="font-size:14px;color:var(--text3);margin-top:14px;margin-bottom:8px">🏥 الأطباء المسجّلون لديك (${_myProspects.length}) — دوس "تسجيل متابعة" لتسجيل نتيجة الزيارة</div>
    ${_myProspects.map(p=>`
      <div class="card" style="padding:10px 14px">
        <div style="font-size:15px;font-weight:700">${esc(p.doctor)}</div>
        <div style="font-size:12px;color:var(--text3)">${esc(p.phone||'-')} ${p.city?'· '+esc(p.city):''} ${p.gov?'· '+esc(p.gov):''}</div>
        <div style="font-size:12px;color:var(--gold2);margin-top:2px">${RESULT_LABELS[p.status]||(p.status==='new'?'🆕 جديد':esc(p.status||'-'))}</div>
        <button class="btn btn-ghost btn-sm" style="margin-top:8px;width:100%" onclick="openVisitModal(${esc(p.id)})">🔄 تسجيل متابعة</button>
      </div>`).join('')}`:''}`;
  _ncGeo=null;
}

function onNcGovChange(){
  const gov=document.getElementById('nc-gov').value;
  const citySel=document.getElementById('nc-city');
  const cities=EGY_CITIES[gov]||[];
  citySel.innerHTML='<option value="">-- اختر المدينة --</option>'+cities.map(ct=>`<option value="${esc(ct)}">${esc(ct)}</option>`).join('');
}

function captureNcGeo(){
  const btn=document.getElementById('nc-geo-btn');
  if(!navigator.geolocation){toast('الجهاز لا يدعم تحديد الموقع','err');return;}
  btn.textContent='⏳ جاري التحديد...';
  navigator.geolocation.getCurrentPosition(pos=>{
    _ncGeo={lat:pos.coords.latitude,lng:pos.coords.longitude};
    btn.textContent='✅ تم تحديد الموقع';
    btn.classList.add('geo-ok');
    toast('✅ تم تحديد موقعك');
  },err=>{
    btn.textContent='📍 تحديد موقعي الحالي';
    toast('تعذّر تحديد الموقع — تأكد من تفعيل صلاحية الموقع','err');
  },{enableHighAccuracy:true,timeout:10000});
}

async function submitNewProspect(){
  const doctor=document.getElementById('nc-doctor').value.trim();
  if(!doctor){toast('اسم الدكتور مطلوب','err');return;}
  try{
    const id=Date.now();
    const rec={
      id,center:doctor,doctor,
      phone:document.getElementById('nc-phone').value.trim(),
      whatsapp:document.getElementById('nc-whatsapp').value.trim(),
      gov:document.getElementById('nc-gov').value,
      city:document.getElementById('nc-city').value,
      address:document.getElementById('nc-address').value.trim(),
      notes:document.getElementById('nc-notes').value.trim(),
      geo:_ncGeo||null,
      delegate:_user.name,
      doctorsCount:1,units:0,doctors:[],
      status:'new',createdAt:Date.now()
    };
    await fbUpdate('data/shared/prospects',{[id]:rec});
    _myProspects=[rec,..._myProspects];

    // تسجيل أول زيارة تلقائيًا مع إضافة العميل — عشان تظهر في تاب "متابعة زيارة" وفي التقرير اليومي
    const visitId=id+1;
    const visitRec={id:visitId,delegate:_user.name,prospectId:id,doctor,date:shiftToday(),result:'new',notes:rec.notes,createdAt:Date.now()};
    await fbUpdate('data/shared/prospect_visits',{[visitId]:visitRec});
    _myVisits=[visitRec,..._myVisits];

    toast('✅ تم حفظ الزيارة');
    renderAddClient();
  }catch(e){console.error(e);toast('خطأ في الحفظ','err');}
}

// ═══════════════════════════════════════
// VISIT MODAL
// ═══════════════════════════════════════
// ═══════════════════════════════════════
// VISIT MODAL — تسجيل زيارة لعميل محتمل
// ═══════════════════════════════════════
function openVisitModal(prospectId){
  const sel=document.getElementById('vm-prospect');
  sel.innerHTML='<option value="">-- اختر --</option>'+
    _myProspects.map(p=>`<option value="${esc(p.id)}">${esc(p.center)} — ${esc(p.doctor)}</option>`).join('');
  sel.value=prospectId||'';
  document.getElementById('vm-notes').value='';
  document.getElementById('vm-result').value='';
  document.getElementById('vm-date').value=shiftToday();
  onVisitProspectChange();
  document.getElementById('visit-modal').classList.remove('hidden');
}
function onVisitProspectChange(){
  const pid=document.getElementById('vm-prospect').value;
  const drSel=document.getElementById('vm-doctor');
  const p=_myProspects.find(x=>String(x.id)===String(pid));
  if(!p){drSel.innerHTML='<option value="">-- اختر الدكتور --</option>';return;}
  const options=[{name:p.doctor},...(p.doctors||[])].filter(d=>d.name);
  drSel.innerHTML='<option value="">-- اختر الدكتور --</option>'+options.map(d=>`<option value="${esc(d.name)}">${esc(d.name)}</option>`).join('');
}
function closeVisitModal(){document.getElementById('visit-modal').classList.add('hidden');}

async function saveVisit(){
  const prospectId=+document.getElementById('vm-prospect').value;
  const doctor=document.getElementById('vm-doctor').value;
  const result=document.getElementById('vm-result').value;
  const notes=document.getElementById('vm-notes').value.trim();
  const date=document.getElementById('vm-date').value||shiftToday();
  if(!prospectId||!doctor||!result){toast('العميل والدكتور والنتيجة مطلوبين','err');return;}
  try{
    const id=Date.now();
    const rec={id,delegate:_user.name,prospectId,doctor,date,result,notes,createdAt:Date.now()};
    await fbUpdate('data/shared/prospect_visits',{[id]:rec});
    // تحديث حالة العميل المحتمل بنتيجة الزيارة — زي saveProspectVisit() الأصلية بالظبط
    const idx=_myProspects.findIndex(p=>p.id===prospectId);
    if(idx>=0){
      _myProspects[idx]={..._myProspects[idx],status:result};
      await fbUpdate('data/shared/prospects',{[prospectId]:_myProspects[idx]});
    }
    _myVisits=[rec,..._myVisits];
    closeVisitModal();
    toast('✅ تم حفظ الزيارة');
    loadTab(_curTab);
  }catch(e){console.error(e);toast('خطأ في الحفظ','err');}
}

// ═══════════════════════════════════════
// AUTO LOGIN
// ═══════════════════════════════════════
// ═══════════════════════════════════════
// AUTO LOGIN (لو فيه جلسة محفوظة على نفس الجهاز فقط)
// ═══════════════════════════════════════
window.addEventListener('load',async ()=>{
  const saved=localStorage.getItem('dp_user');
  if(saved){
    try{_user=JSON.parse(saved);await waitForFirebase();showApp();return;}
    catch(e){localStorage.removeItem('dp_user');}
  }
  // مفيش جلسة محفوظة — يفضل شاشة تسجيل الدخول ظاهرة وينتظر إدخال بيانات حقيقية
});
</script>
