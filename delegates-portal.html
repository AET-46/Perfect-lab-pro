<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📋 مركز المناديب — Perfect Lab</title>
<!-- Firebase SDK — نفس تحميل السيستم الكبير -->
<script>
(function() {
  function loadScript(url, fallback, cb) {
    var s = document.createElement('script');
    s.src = url; s.onload = cb;
    s.onerror = function() {
      var s2 = document.createElement('script');
      s2.src = fallback; s2.onload = cb;
      s2.onerror = function(){ console.error('Firebase SDK failed to load'); };
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  }
  loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js','https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.min.js',function(){
    loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js','https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-database-compat.min.js',function(){});
    loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js','https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-auth-compat.min.js',function(){});
  });
})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
/* ═══ THEME 1 — ذهبي (إنستجرام) وأسود لامع — الافتراضي ═══ */
:root, body[data-theme="goldblack"]{
  --bg:#000000;--bg2:#121212;--bg3:#1c1c1c;--bg4:#262626;
  --text:#ffffff;--text2:#f5cf6b;--text3:#9a9a9a;
  --gold:#ffb400;--gold2:#ffd60a;
  --teal:#00d2af;--green:#2ecc71;--red:#ff4459;
  --orange:#ff7a00;--blue:#3897f0;--purple:#c13584;
  --border:#332b12;--radius:14px;
  --grad:linear-gradient(135deg,var(--gold),var(--gold2));
  --ontext:#1a1200;
  --gloss:inset 0 1px 0 rgba(255,255,255,.08), 0 4px 18px rgba(0,0,0,.5);
}
/* ═══ THEME 2 — أخضر (واتساب) وأبيض ═══ */
body[data-theme="whitegreen"]{
  --bg:#f7f9fa;--bg2:#ffffff;--bg3:#e9f5ef;--bg4:#d9f2e3;
  --text:#111b21;--text2:#54656f;--text3:#8696a0;
  --gold:#25d366;--gold2:#128c7e;
  --teal:#128c7e;--green:#25d366;--red:#e53935;
  --orange:#f39c12;--blue:#34b7f1;--purple:#7c5cff;
  --border:#d1d7db;--radius:14px;
  --grad:linear-gradient(135deg,var(--gold),var(--gold2));
  --ontext:#ffffff;
}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;transition:background .3s}
.glass{background:color-mix(in srgb, var(--bg2) 85%, transparent);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
/* THEME SWITCHER */
.theme-btn{background:var(--bg3);border:1px solid var(--border);color:var(--gold2);border-radius:10px;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
#login-screen.hidden{display:none}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px 24px;width:100%;max-width:360px;text-align:center}
.login-card h1{font-size:24px;color:var(--gold2);margin-bottom:4px}
.login-card p{font-size:14px;color:var(--text3);margin-bottom:24px}
.login-card input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:16px;font-family:inherit;margin-bottom:12px;direction:rtl}
.login-card input:focus{outline:none;border-color:var(--gold)}
.btn-login{width:100%;background:var(--grad);color:var(--ontext);font-weight:900;font-size:17px;border:none;border-radius:10px;padding:13px;cursor:pointer;font-family:inherit}
.login-err{color:var(--red);font-size:14px;margin-top:8px;display:none}

/* HEADER */
.header{background:color-mix(in srgb, var(--bg2) 92%, transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:17px;font-weight:900;color:var(--gold2)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--grad);color:var(--ontext);font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:8px;padding:4px 10px;font-size:13px;cursor:pointer;font-family:inherit}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 8px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:11px 12px;font-size:14px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}
.tab.on{color:var(--gold2);border-bottom-color:var(--gold)}

/* SEARCH */
.search-wrap{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:90}
.search-box{position:relative;display:flex;align-items:center}
.search-box svg{position:absolute;right:12px;width:15px;height:15px;color:var(--text3);pointer-events:none}
.search-box input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 36px 10px 32px;color:var(--text);font-size:15px;font-family:inherit;direction:rtl;transition:border-color .2s}
.search-box input:focus{outline:none;border-color:var(--gold)}
.search-box input::placeholder{color:var(--text3)}
.date-filter-row{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.date-filter-lbl{font-size:12px;color:var(--text3);font-weight:700}
.date-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 8px;color:var(--text);font-size:13px;font-family:inherit}
.date-filter-clear{background:none;border:none;color:var(--red);font-size:12px;font-weight:700;cursor:pointer;padding:4px}
.search-clear{position:absolute;left:8px;width:20px;height:20px;border:none;background:var(--bg4);color:var(--text3);border-radius:50%;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.search-clear.show{display:flex}

/* CONTENT */
.content{padding:14px;max-width:600px;margin:0 auto}

/* CARDS */
.card{background:color-mix(in srgb, var(--bg2) 90%, transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--gloss, 0 4px 18px rgba(0,0,0,.18))}
.card-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.card-head h3{font-size:15px;font-weight:900}

/* CLIENT CARD */
.client-card{background:color-mix(in srgb, var(--bg2) 90%, transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--gloss, 0 4px 18px rgba(0,0,0,.18));transition:transform .15s}
.client-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
.client-name{font-size:16px;font-weight:900}
.client-meta{font-size:13px;color:var(--text3);margin-top:3px}
.client-stats{display:flex;gap:10px;margin-top:6px}
.stat-pill{font-size:12px;padding:2px 8px;border-radius:20px;font-weight:700}
.pill-blue{background:rgba(59,130,246,.15);color:var(--blue)}
.pill-orange{background:rgba(249,115,22,.15);color:var(--orange)}
.pill-green{background:rgba(34,197,94,.15);color:var(--green)}
.pill-red{background:rgba(239,68,68,.15);color:var(--red)}
.client-body{display:none;border-top:1px solid var(--border);padding:12px 14px}
.client-body.open{display:block}

/* CASE ROW */
.case-row{padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.case-row:last-child{border:none}
.case-row-head{display:flex;justify-content:space-between;align-items:center}
.case-src{font-size:12px;padding:2px 6px;border-radius:20px;font-weight:700}
.src-dafter{background:rgba(59,130,246,.15);color:var(--blue)}
.src-proof{background:rgba(249,115,22,.15);color:var(--orange)}
.src-archive{background:rgba(34,197,94,.15);color:var(--green)}

/* VISIT FORM */
.visit-form{background:var(--bg3);border-radius:10px;padding:12px;margin-top:10px}
.visit-form textarea{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:14px;font-family:inherit;resize:none;direction:rtl;margin-bottom:8px}
.visit-form select{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:14px;font-family:inherit;margin-bottom:8px}

/* ADD CLIENT FORM */
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;color:var(--text3);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:15px;font-family:inherit;direction:rtl}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold)}

/* COMMISSION */
.comm-card{background:color-mix(in srgb, var(--bg2) 90%, transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--gloss, 0 4px 18px rgba(0,0,0,.18))}
.comm-total{font-size:30px;font-weight:900;color:var(--gold2)}
.comm-sub{font-size:13px;color:var(--text3);margin-top:2px}
.comm-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
.comm-row:last-child{border:none}

/* VISIT HISTORY */
.visit-item{padding:10px 0;border-bottom:1px solid var(--border)}
.visit-item:last-child{border:none}
.visit-type{font-size:12px;padding:2px 7px;border-radius:20px;font-weight:700;display:inline-block;margin-bottom:4px}
.vt-call{background:rgba(59,130,246,.15);color:var(--blue)}
.vt-visit{background:rgba(168,85,247,.15);color:var(--purple)}
.vt-followup{background:rgba(249,115,22,.15);color:var(--orange)}
.vt-other{background:rgba(107,112,144,.15);color:var(--text3)}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:700}
.badge-pending{background:rgba(249,115,22,.15);color:var(--orange)}
.badge-approved{background:rgba(45,212,191,.15);color:var(--teal)}

/* BUTTONS */
.btn{padding:9px 16px;border-radius:10px;border:none;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:transform .12s,filter .12s}
.btn:active{transform:scale(.96)}
.btn-gold{background:var(--grad);color:var(--ontext);box-shadow:0 3px 12px color-mix(in srgb, var(--gold) 35%, transparent), inset 0 1px 0 rgba(255,255,255,.35)}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-teal{background:rgba(45,212,191,.15);color:var(--teal);border:1px solid var(--teal)}
.btn-green{background:rgba(34,197,94,.15);color:var(--green);border:1px solid var(--green)}
.btn-red{background:rgba(239,68,68,.15);color:var(--red);border:1px solid var(--red)}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-block{width:100%;padding:11px}

/* DELIVERY CARDS */
.deliv-card{background:color-mix(in srgb, var(--bg2) 90%, transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;padding:14px;box-shadow:var(--gloss, 0 4px 18px rgba(0,0,0,.18))}
.deliv-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.deliv-client{font-size:16px;font-weight:900;color:var(--text)}
.deliv-meta{font-size:13px;color:var(--text3);margin-top:2px}
.deliv-product{font-size:14px;color:var(--gold2);margin-top:3px}
.deliv-btns{display:flex;gap:8px;margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.deliv-btns .btn{flex:1}
.deliv-badge{font-size:12px;padding:3px 9px;border-radius:20px;font-weight:700}
.deliv-badge.delivered{background:rgba(34,197,94,.15);color:var(--green)}
.deliv-badge.returned{background:rgba(239,68,68,.15);color:var(--red)}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:38px;margin-bottom:10px}

/* SPINNER */
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);padding:10px 20px;border-radius:20px;font-size:15px;z-index:9999;opacity:0;transition:.3s;pointer-events:none;border:1px solid var(--border)}
#toast.show{opacity:1}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:999;padding:16px}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal-box h3{font-size:17px;font-weight:900;margin-bottom:16px;color:var(--gold2)}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns .btn{flex:1}

/* DEBT BADGE */
.debt-badge{font-size:13px;padding:3px 8px;border-radius:20px;font-weight:700}
.debt-ok{background:rgba(34,197,94,.1);color:var(--green)}
.debt-warn{background:rgba(239,68,68,.1);color:var(--red)}
</style>
</head>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>📋 مركز المناديب</h1>

<!-- SEARCH -->
<div class="search-wrap" id="search-wrap" style="display:none">

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="search-input" placeholder="بحث بالاسم أو رقم الحالة..." oninput="onSearchInput(this.value)">

    <button class="date-filter-clear" id="date-clear-btn" onclick="clearDateFilter()" style="display:none">✕ مسح التاريخ</button>
  </div>
</div>

<!-- CONTENT -->

  <div id="tab-content"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay hidden" id="confirm-modal">
  <div class="modal-box">
    <h3 id="cm-title"></h3>
    <p id="cm-msg" style="font-size:14px;color:var(--text2);margin-bottom:6px"></p>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-gold" id="cm-ok">تأكيد</button>
    </div>
  </div>
</div>

<!-- VISIT MODAL -->
<!-- ADMIN PICK MODAL -->
<div class="modal-overlay hidden" id="admin-pick-modal">
  <div class="modal-box">
    <h3 style="font-size:15px;font-weight:900;margin-bottom:4px;color:var(--gold2)">📤 إرسال التقرير إلى</h3>
    <p style="font-size:12px;color:var(--text3);margin-bottom:10px">اختر رقم الإدارة المطلوب إرسال التقرير عليه</p>
    <div id="admin-pick-list"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeAdminPick()">إلغاء</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="visit-modal">
  <div class="modal-box">
    <h3>🗓️ تسجيل زيارة عميل محتمل</h3>
    <div class="form-group">
      <label>العميل المحتمل *</label>
      <select id="vm-prospect" onchange="onVisitProspectChange()">
        <option value="">-- اختر --</option>
      </select>
    </div>

      <label>نتيجة الزيارة *</label>
      <select id="vm-result">
        <option value="">-- اختر --</option>
        <option value="interested">✅ مهتم</option>
        <option value="not_interested">❌ غير مهتم</option>
        <option value="follow">🔄 متابعة</option>
        <option value="contracted">🤝 تم التعاقد</option>
      </select>
    </div>
    <div class="form-group">
      <label>ملاحظات</label>
      <textarea id="vm-notes" rows="3" placeholder="ما الذي دار في الزيارة؟"></textarea>

      <label>التاريخ</label>

    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeVisitModal()">إلغاء</button>

    </div>
  </div>
</div>

let _fbRTDB=null,_fbInitDone=false,_fbAuthPending=false;
function _initFirebase(){
  if(typeof firebase==='undefined')return false;
  if(_fbInitDone)return true;
  if(_fbAuthPending)return false;
  if(typeof firebase.database!=='function')return false;
  if(typeof firebase.auth!=='function')return false;
  try{
    if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
    _fbAuthPending=true;
    firebase.auth().signInAnonymously().then(function(){
      _fbRTDB=firebase.database();_fbInitDone=true;_fbAuthPending=false;
      console.log('✅ Firebase: متصل بقاعدة بيانات PerfectLabPro');
    }).catch(function(e){_fbAuthPending=false;console.error('Firebase auth error:',e&&(e.code||e.message));});
    return false;
  }catch(e){console.warn('Firebase init error:',e);return false;}
}
function waitForFirebase(){
  return new Promise(resolve=>{
    if(_fbInitDone){resolve(true);return;}
    let tries=0;
    const iv=setInterval(()=>{
      if(!_fbInitDone)_initFirebase();
      tries++;
      if(_fbInitDone||tries>100){clearInterval(iv);resolve(_fbInitDone);}
    },100);
  });
}
_initFirebase();
async function fbGet(path){
  await waitForFirebase();
  if(!_fbRTDB)return null;
  const snap=await _fbRTDB.ref(path).get();
  return snap.exists()?snap.val():null;
}
async function fbSet(path,val){
  await waitForFirebase();
  if(!_fbRTDB)throw new Error('لا يوجد اتصال بالإنترنت');
  return _fbRTDB.ref(path).set(val);
}
async function fbUpdate(path,val){
  await waitForFirebase();
  if(!_fbRTDB)throw new Error('لا يوجد اتصال بالإنترنت');
  return _fbRTDB.ref(path).update(val);
}
async function fbPush(path,val){
  await waitForFirebase();
  if(!_fbRTDB)throw new Error('لا يوجد اتصال بالإنترنت');
  const ref=_fbRTDB.ref(path).push();
  await ref.set({...val,id:ref.key});
  return ref.key;
}
function toArr(v){if(!v)return[];return Array.isArray(v)?v.filter(Boolean):Object.values(v).filter(Boolean);}
async function hashPassword(pass){
  const enc=new TextEncoder();
  const buf=await crypto.subtle.digest('SHA-256',enc.encode(pass));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function verifyPassword(pass,stored){
  if(!stored)return false;
  if(stored.length!==64)return pass===stored;
  return (await hashPassword(pass))===stored;
}

async function doLogin(){
  const uname=document.getElementById('lg-user').value.trim();
  const pass=document.getElementById('lg-pass').value.trim();
  if(!uname||!pass){toast('أدخل البيانات','err');return;}
  try{
    await waitForFirebase();
    if(!_fbRTDB){
      const saved=localStorage.getItem('dp_user');
      if(saved){_user=JSON.parse(saved);showApp();return;}
      showErr('لا يوجد اتصال بالإنترنت');return;
    }
    const users=toArr(await fbGet('data/shared/users'));
    const u=users.find(x=>x.role==='delegate'&&(x.name===uname||x.email===uname)&&x.active!==false);
    if(!u||!(await verifyPassword(pass,u.passHash||u.pass||''))){showErr();return;}
    const delegates=toArr(await fbGet('data/shared/delegates'));
    const del=delegates.find(d=>d.name===u.name)||{};
    _user={name:u.name,id:del.id||u.uid||u.name,commRate:del.comm||0,salary:del.salary||0};
    localStorage.setItem('dp_user',JSON.stringify(_user));
    showApp();
  }catch(e){
    console.error(e);
    const saved=localStorage.getItem('dp_user');
    if(saved){_user=JSON.parse(saved);showApp();}
    else showErr('خطأ في الاتصال');

// تقرير واتساب يومي للإدارة (شغل اليوم + حساب اليوم)
// ═══════════════════════════════════════
function buildDailyReportMsg(){
  const todayDate=today();
  const todayArchive=_archive.filter(r=>r.archivedAt&&new Date(r.archivedAt).toISOString().split('T')[0]===todayDate);
  const delivered=todayArchive.filter(r=>r.handoverStatus==='delivered');
  const returned=todayArchive.filter(r=>r.handoverStatus==='returned');
  const totalSales=delivered.reduce((s,r)=>s+(+r.total||0),0);
  const rate=_user.commRate||0;
  const comm=totalSales*(rate/100);
  const visitsToday=_myVisits.filter(v=>v.date===todayDate);

  let msg=`📋 *تقرير يومي — ${_user.name}*\n`;
  msg+=`📅 ${todayDate}\n\n`;
  msg+=`🚚 *التسليمات اليوم:* ${delivered.length}\n`;
  delivered.forEach(r=>{msg+=`  • ${r.client||'-'} — #${r.caseId||'-'} — ${r.product||'-'} (${r.deliveryType||'-'})\n`;});
  if(returned.length){
    msg+=`\n↩️ *مرتجعات اليوم:* ${returned.length}\n`;
    returned.forEach(r=>{msg+=`  • ${r.client||'-'} — #${r.caseId||'-'}\n`;});
  }
  msg+=`\n🗓️ *زيارات اليوم:* ${visitsToday.length}\n`;
  msg+=`\n💰 *حساب اليوم:*\n`;
  msg+=`إجمالي مبيعات اليوم: ${fmt(totalSales)} ج.م\n`;
  msg+=`عمولتك (${rate}%): ${fmt(comm)} ج.م\n`;
  if(!delivered.length&&!returned.length&&!visitsToday.length)msg+=`\n— لا يوجد نشاط مسجّل اليوم —`;
  return msg;
}

// DELIVERIES TAB — تسليم / ارتجاع (بروفه أو نهائي)
// ═══════════════════════════════════════
// المنتجات اللي بتاخد مرحلة "بروفه" الأول (زيركون/معدن/بورسلين/فيس)
// أي منتج تاني (متحرك/تقويم..) بيعتبر "نهائي" وبيروح للتسليم على طول من الدفتر
function needsProofStage(product){
  const n=(product||'').toLowerCase();
  return n.includes('زيركون')||n.includes('معدن')||n.includes('بورسلين')||n.includes('فيس');
}

function renderDeliveries(){
  const c=document.getElementById('tab-content');
  // بروفه: حالات محوّلة للبروفه وجاهزة للتسليم
  const proofItems=_proof.map(r=>({...r,delivType:'بروفة'}));
  // نهائي: حالات في الدفتر لمنتجات مالهاش مراحل فني (بتتسلم مباشرة بدون بروفه)
  const finalItems=_dafter.filter(r=>!needsProofStage(r.product)).map(r=>({...r,delivType:'نهائي'}));
  const source=[...proofItems,...finalItems].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const pending=source.filter(r=>matchesSearch([r.client,r.noteName,r.caseId,r.product])&&matchesDateRange(r.date));

  if(!source.length){
    c.innerHTML=`<button class="btn btn-teal btn-sm btn-block" style="margin-bottom:12px" onclick="sendDailyReportToAdmin()">📱 إرسال تقرير اليوم للإدارة (واتساب)</button>
      <div class="empty"><div class="empty-icon">🚚</div><p>مفيش حالات جاهزة للتسليم دلوقتي</p></div>`;return;
  }
  if(!pending.length){
    c.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><p>لا توجد نتائج مطابقة للبحث</p></div>`;return;
  }

  c.innerHTML=`<button class="btn btn-teal btn-sm btn-block" style="margin-bottom:12px" onclick="sendDailyReportToAdmin()">📱 إرسال تقرير اليوم للإدارة (واتساب)</button>
    <div style="font-size:14px;color:var(--text3);margin-bottom:10px">${pending.length} حالة جاهزة للتسليم (بروفه: ${proofItems.length} · نهائي: ${finalItems.length})</div>`+
  pending.map(r=>`
    <div class="deliv-card" id="deliv-${esc(r.id)}">
      <div class="deliv-head">
        <div>
          <div class="deliv-client">${esc(r.client)}</div>
          ${r.noteName?`<div style="font-size:13px;color:var(--teal)">👤 ${esc(r.noteName)}</div>`:''}
          <div class="deliv-meta">#${esc(String(r.caseId||'-'))} · ${esc(r.date||'-')}</div>
          <div class="deliv-product">🦷 ${esc(r.product||'-')} ${r.qty>1?`× ${r.qty}`:''}</div>
        </div>
        <span class="case-src ${r.delivType==='بروفة'?'src-proof':'src-dafter'}">${esc(r.delivType)}</span>
      </div>
      <div class="deliv-btns">
        <button class="btn btn-green" onclick="confirmDelivery('${esc(r.id)}','${esc(r.delivType)}')">✅ تأكيد التسليم</button>
        <button class="btn btn-red" onclick="confirmReturn('${esc(r.id)}','${esc(r.delivType)}')">↩️ تأكيد الارتجاع</button>
      </div>
    </div>`).join('');
}

function showModal(title,msg,onOk){
  document.getElementById('cm-title').textContent=title;
  document.getElementById('cm-msg').textContent=msg;
  const okBtn=document.getElementById('cm-ok');
  const newOk=okBtn.cloneNode(true); // إزالة أي مستمعين سابقين
  okBtn.parentNode.replaceChild(newOk,okBtn);
  newOk.addEventListener('click',()=>{closeModal();onOk();});
  document.getElementById('confirm-modal').classList.remove('hidden');
}
function closeModal(){document.getElementById('confirm-modal').classList.add('hidden');}

function findDelivItem(id,delivType){
  return delivType==='بروفة'?_proof.find(x=>x.id===id):_dafter.find(x=>x.id===id);
}

async function confirmDelivery(id,delivType){
  const r=findDelivItem(id,delivType);
  if(!r)return;
  showModal('تأكيد التسليم',`هل تم تسليم حالة "${r.client}" · #${r.caseId||'-'} (${delivType}) فعلاً للعميل؟`,async()=>{
    try{
      await moveToArchive(r,'delivered',delivType);
      toast('✅ تم تأكيد التسليم');
      loadTab('deliveries'); // الصفحة تفضل فاضية من الحالة دي بعد التأكيد
    }catch(e){toast('خطأ أثناء التأكيد','err');}
  });
}

async function confirmReturn(id,delivType){
  const r=findDelivItem(id,delivType);
  if(!r)return;
  showModal('تأكيد الارتجاع',`هل تم ارتجاع حالة "${r.client}" · #${r.caseId||'-'} (${delivType}) من العميل؟`,async()=>{
    try{
      await moveToArchive(r,'returned',delivType);
      toast('↩️ تم تسجيل الارتجاع');
      loadTab('deliveries');
    }catch(e){toast('خطأ أثناء التأكيد','err');}
  });
}

// نقل حالة (بروفه أو نهائي من الدفتر) إلى الأرشيف — بنفس شكل doArchive() الحقيقي بالظبط
// ⚠️ ملاحظة أمان: dafter/proof متخزّنين كمصفوفة كاملة في فايربيز (زي السيستم الكبير
// بالظبط)، فالعملية دي بتقرا المصفوفة كاملة وتكتبها تاني بعد الحذف — لو حصل تعديل
// من جهاز تاني في نفس اللحظة بالظبط ممكن يحصل تعارض. نفس المخاطرة الموجودة أصلاً
// في moveToProof()/doArchive() بالسيستم الكبير، فمفيش تغيير في مستوى الأمان الحالي.
//
// ⚠️ مهم جدًا: حقل "status" في الأرشيف الحقيقي بيعني حالة السداد (unpaid/paid) —
// مش حالة التسليم! فبنستخدم حقل مستقل "handoverStatus" عشان "تم التسليم/تم الارتجاع"
// من غير ما نلخبط حساب مديونية العميل في السيستم الكبير.
async function moveToArchive(r,handoverStatus,delivType){
  const srcPath=delivType==='بروفة'?'data/shared/proof':'data/shared/dafter';
  // 1) شيل الحالة من مصدرها المشترك (بروفه أو دفتر)
  const srcAll=toArr(await fbGet(srcPath));
  const newSrc=srcAll.filter(p=>p.id!==r.id);
  await fbSet(srcPath,newSrc);
  // 2) ضيفها للأرشيف — نفس شكل doArchive() في السيستم الكبير بالظبط
  const archiveAll=toArr(await fbGet('data/shared/archive'));
  const arcTs=Date.now();
  const archived={
    ...r,
    id:'a_'+r.id+'_'+arcTs,
    sourceId:r.id,
    handoverStatus, // 'delivered' | 'returned' — حقلنا الخاص، منفصل عن حساب السداد
    deliveryType:delivType,
    technicians:r.technicians||{},
    paid:0,
    remaining:r.total||0,
    status:'unpaid', // نفس قيمة doArchive() الافتراضية — بيتغيّر لاحقًا من صفحة الخزنة عند التحصيل
    archivedAt:arcTs,
    createdAt:r.createdAt||arcTs
  };
  await fbSet('data/shared/archive',[...archiveAll,archived]);
  // 3) تحديث الحالة المحلية فورًا
  if(delivType==='بروفة')_proof=_proof.filter(p=>p.id!==r.id);
  else _dafter=_dafter.filter(p=>p.id!==r.id);
  _archive=[..._archive,archived];
}


const RESULT_LABELS={interested:'✅ مهتم',not_interested:'❌ غير مهتم',follow:'🔄 متابعة',contracted:'🤝 تم التعاقد'};
function renderVisits(){
  const c=document.getElementById('tab-content');
  c.innerHTML=`<button class="btn btn-gold btn-sm" style="margin-bottom:12px" onclick="openVisitModal()">➕ تسجيل زيارة جديدة</button>`;
  if(!_myProspects.length){
    c.innerHTML+=`<div class="empty"><div class="empty-icon">🗓️</div><p>لسه معندكش عملاء محتملين مسجّلين — ضيفي واحد من تاب "عميل محتمل"</p></div>`;return;
  }
  const filtered=_myVisits.filter(v=>{
    const p=_myProspects.find(pp=>pp.id===v.prospectId);
    return matchesSearch([p?.center,p?.doctor,v.doctor,v.notes])&&matchesDateRange(v.date);
  });
  c.innerHTML+=`<div style="font-size:14px;color:var(--text3);margin-bottom:10px">${_myProspects.length} عميل محتمل · ${_myVisits.length} زيارة مسجّلة</div>`;
  if(!filtered.length&&_searchQuery){
    c.innerHTML+=`<div class="empty"><div class="empty-icon">🔍</div><p>لا توجد نتائج مطابقة للبحث</p></div>`;return;
  }
  c.innerHTML+=filtered.map(v=>{
    const p=_myProspects.find(pp=>pp.id===v.prospectId);
    return`<div class="card" style="padding:12px 14px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div>
          <span class="visit-type vt-${v.result==='contracted'?'visit':v.result==='interested'?'followup':v.result==='not_interested'?'call':'other'}">${RESULT_LABELS[v.result]||v.result}</span>
          <span style="font-size:14px;font-weight:700;margin-right:6px">${esc(p?p.center+' — '+p.doctor:'عميل محتمل #'+v.prospectId)}</span>
        </div>
        <span style="font-size:12px;color:var(--text3)">${esc(v.date)}</span>
      </div>
      ${v.doctor?`<div style="font-size:13px;color:var(--teal)">👨‍⚕️ ${esc(v.doctor)}</div>`:''}
      <div style="font-size:14px">${esc(v.notes||'-')}</div>
    </div>`;
  }).join('');
}

function renderCommission(){
  const c=document.getElementById('tab-content');
  const rate=_user.commRate||0;

  // حساب العمولة من الأرشيف (الحالات المكتملة)
  let totalComm=0;
  const byClient={};
  _archive.forEach(r=>{
    const total=+r.total||0;
    const comm=total*(rate/100);
    totalComm+=comm;
    const cn=r.client||'-';
    if(!byClient[cn])byClient[cn]={cases:0,total:0,comm:0};
    byClient[cn].cases++;byClient[cn].total+=total;byClient[cn].comm+=comm;
  });

  const totalDebt=_archive.reduce((s,r)=>s+(+r.remaining||0),0);
  const totalCollected=_archive.reduce((s,r)=>s+(+r.paid||0),0);

  c.innerHTML=`
    <div class="comm-card">
      <div style="font-size:14px;color:var(--text3);margin-bottom:6px">💰 إجمالي العمولة المحسوبة</div>
      <div class="comm-total">${fmt(totalComm)} ج.م</div>
      <div class="comm-sub">نسبة ${rate}% من ${_archive.length} حالة مكتملة</div>
    </div>
    ${_user.salary>0?`<div class="comm-card">
      <div style="font-size:14px;color:var(--text3);margin-bottom:6px">🏦 الراتب الثابت</div>
      <div class="comm-total" style="color:var(--teal)">${fmt(_user.salary)} ج.م / شهريًا</div>
      <div class="comm-sub">إجمالي مستحقاتك المتوقعة: ${fmt(_user.salary+totalComm)} ج.م (راتب + عمولة)</div>
    </div>`:''}
    <div class="comm-card">
      <div style="font-size:14px;color:var(--text3);margin-bottom:10px">📊 ملخص مالي</div>
      <div class="comm-row"><span style="color:var(--text3)">إجمالي مبيعات عملاءك</span><span style="font-weight:700">${fmt(_archive.reduce((s,r)=>s+(+r.total||0),0))} ج.م</span></div>
      <div class="comm-row"><span style="color:var(--text3)">تم تحصيله</span><span style="font-weight:700;color:var(--green)">${fmt(totalCollected)} ج.م</span></div>
      <div class="comm-row"><span style="color:var(--text3)">متبقي (ديون)</span><span style="font-weight:700;color:${totalDebt>0?'var(--red)':'var(--green)'}">${fmt(totalDebt)} ج.م</span></div>
      <div class="comm-row"><span style="color:var(--text3)">نسبة عمولتك</span><span style="font-weight:700;color:var(--gold2)">${rate}%</span></div>
    </div>
    <div class="comm-card">
      <div style="font-size:14px;color:var(--text3);margin-bottom:10px">👥 تفصيل حسب العميل</div>
      ${Object.entries(byClient).map(([name,d])=>`
        <div class="comm-row">
          <div>
            <div style="font-size:14px;font-weight:700">${esc(name)}</div>
            <div style="font-size:12px;color:var(--text3)">${d.cases} حالة · ${fmt(d.total)} ج.م مبيعات</div>
          </div>
          <div style="font-weight:900;color:var(--gold2)">${fmt(d.comm)} ج.م</div>
        </div>`).join('')}
    </div>`;
}

async function submitNewProspect(){
  const center=document.getElementById('nc-center').value.trim();
  const doctor=document.getElementById('nc-doctor').value.trim();
  if(!center||!doctor){toast('اسم المركز والدكتور مطلوبان','err');return;}
  try{
    const id=Date.now();
    const rec={
      id,center,doctor,
      phone:document.getElementById('nc-phone').value.trim(),
      whatsapp:document.getElementById('nc-whatsapp').value.trim(),
      gov:document.getElementById('nc-gov').value.trim(),
      city:document.getElementById('nc-city').value.trim(),
      address:document.getElementById('nc-address').value.trim(),
      notes:document.getElementById('nc-notes').value.trim(),
      delegate:_user.name,
      doctorsCount:1,units:0,doctors:[],
      status:'new',createdAt:Date.now()
    };
    await fbUpdate('data/shared/prospects',{[id]:rec});
    _myProspects=[rec,..._myProspects];
    toast('✅ تم حفظ العميل المحتمل');
    ['nc-center','nc-doctor','nc-phone','nc-whatsapp','nc-gov','nc-city','nc-address','nc-notes'].forEach(id=>{
      const el=document.getElementById(id);if(el)el.value='';
    });
    renderAddClient();
  }catch(e){console.error(e);toast('خطأ في الحفظ','err');}
}

// VISIT MODAL — تسجيل زيارة لعميل محتمل

function openVisitModal(prospectId){
  const sel=document.getElementById('vm-prospect');
  sel.innerHTML='<option value="">-- اختر --</option>'+
    _myProspects.map(p=>`<option value="${esc(p.id)}">${esc(p.center)} — ${esc(p.doctor)}</option>`).join('');
  sel.value=prospectId||'';
  document.getElementById('vm-notes').value='';
  document.getElementById('vm-result').value='';
  document.getElementById('vm-date').value=today();
  onVisitProspectChange();
  document.getElementById('visit-modal').classList.remove('hidden');
}
function onVisitProspectChange(){
  const pid=document.getElementById('vm-prospect').value;
  const drSel=document.getElementById('vm-doctor');
  const p=_myProspects.find(x=>String(x.id)===String(pid));
  if(!p){drSel.innerHTML='<option value="">-- اختر الدكتور --</option>';return;}
  const options=[{name:p.doctor},...(p.doctors||[])].filter(d=>d.name);
  drSel.innerHTML='<option value="">-- اختر الدكتور --</option>'+options.map(d=>`<option value="${esc(d.name)}">${esc(d.name)}</option>`).join('');
}
function closeVisitModal(){document.getElementById('visit-modal').classList.add('hidden');}

async function saveVisit(){
  const prospectId=+document.getElementById('vm-prospect').value;
  const doctor=document.getElementById('vm-doctor').value;
  const result=document.getElementById('vm-result').value;
  const notes=document.getElementById('vm-notes').value.trim();
  const date=document.getElementById('vm-date').value||today();
  if(!prospectId||!doctor||!result){toast('العميل والدكتور والنتيجة مطلوبين','err');return;}
  try{
    const id=Date.now();
    const rec={id,delegate:_user.name,prospectId,doctor,date,result,notes,createdAt:Date.now()};
    await fbUpdate('data/shared/prospect_visits',{[id]:rec});
    // تحديث حالة العميل المحتمل بنتيجة الزيارة — زي saveProspectVisit() الأصلية بالظبط
    const idx=_myProspects.findIndex(p=>p.id===prospectId);
    if(idx>=0){
      _myProspects[idx]={..._myProspects[idx],status:result};
      await fbUpdate('data/shared/prospects',{[prospectId]:_myProspects[idx]});
    }
    _myVisits=[rec,..._myVisits];
    closeVisitModal();
    toast('✅ تم حفظ الزيارة');
    loadTab(_curTab);
  }catch(e){console.error(e);toast('خطأ في الحفظ','err');}
}
